    function App() {
      const [tab, setTab] = useState(() => lsLoad("activeTab") || "checklist");
      const [tomorrowTasks, setTomorrowTasks] = useState([]);
      const [bannerOpen, setBannerOpen] = useState(false);
      const [sites, setSites] = useState(null); // null = 로딩 중
      const [activeSiteId, setActiveSiteId] = useState(() => lsLoad("activeSiteId"));
      const [siteSettings, setSiteSettings] = useState(undefined); // undefined = 로딩 중
      const [unlocked, setUnlocked] = useState(() => {
        try { return JSON.parse(sessionStorage.getItem("unlockedSites") || "[]"); } catch { return []; }
      });

      useEffect(() => { lsSave("activeTab", tab); }, [tab]);

      // 현장 목록 로드 (data/main.sites 재사용)
      useEffect(() => {
        (async () => {
          const cloud = await cloudLoad();
          const list = cloud?.sites || lsLoad("sites") || [];
          setSites(list);
          if (activeSiteId && !list.some(s => s.id === activeSiteId)) {
            setActiveSiteId(null);
            lsSave("activeSiteId", null);
          }
        })();
      }, []);

      // 현재 현장의 siteSettings 로드 (PIN/알림/예산 등)
      useEffect(() => {
        if (!activeSiteId) { setSiteSettings(undefined); return; }
        setSiteSettings(undefined);
        (async () => setSiteSettings(await getSiteSettings(activeSiteId)))();
      }, [activeSiteId]);

      // 다음날 공정 알림 (현재 현장 기준)
      useEffect(() => {
        if (!activeSiteId) { setTomorrowTasks([]); setBannerOpen(false); return; }
        (async () => {
          const [data, settings] = await Promise.all([fetchCollection("schedule", activeSiteId), getSiteSettings(activeSiteId)]);
          const notifyEnabled = settings?.notifyEnabled !== false;
          const upcoming = notifyEnabled ? data.filter(t => t.status !== "done" && t.startDate <= tomorrow && (t.endDate||t.startDate) >= tomorrow) : [];
          setTomorrowTasks(upcoming);
          const dismissedFor = lsLoad("alertDismissedDate_" + activeSiteId);
          setBannerOpen(upcoming.length > 0 && dismissedFor !== today);
        })();
      }, [activeSiteId]);

      const dismissBanner = () => {
        setBannerOpen(false);
        lsSave("alertDismissedDate_" + activeSiteId, today);
      };

      const persistSites = async (newSites) => {
        setSites(newSites);
        lsSave("sites", newSites);
        const cloud = await cloudLoad();
        await cloudSave(newSites, cloud?.logs || {});
      };

      const selectSite = (id) => {
        setActiveSiteId(id);
        lsSave("activeSiteId", id);
      };

      const addSite = async (name, address) => {
        const id = newId("site");
        const newSites = [...(sites||[]), { id, name, address, createdAt: new Date().toISOString() }];
        await persistSites(newSites);
        if (address) await saveSiteSettings(id, { address });
        selectSite(id);
      };

      const renameSite = async (id, name) => {
        const newSites = (sites||[]).map(s => s.id===id ? { ...s, name } : s);
        await persistSites(newSites);
      };

      const deleteSite = async (id) => {
        const newSites = (sites||[]).filter(s => s.id !== id);
        await persistSites(newSites);
        setActiveSiteId(null);
        lsSave("activeSiteId", null);
      };

      const switchSite = () => {
        setActiveSiteId(null);
        lsSave("activeSiteId", null);
      };

      const unlockSite = (id) => {
        const next = [...new Set([...unlocked, id])];
        setUnlocked(next);
        try { sessionStorage.setItem("unlockedSites", JSON.stringify(next)); } catch {}
      };

      if (sites === null) {
        return <div style={{ minHeight:"100vh", background:"#1a1a2e" }} />;
      }

      const activeSite = sites.find(s => s.id === activeSiteId);

      if (!activeSiteId || !activeSite) {
        return (
          <>
            <ToastHost />
            <ProjectSelector sites={sites} onSelect={selectSite} onAdd={addSite} />
          </>
        );
      }

      if (siteSettings && siteSettings.pin && !unlocked.includes(activeSiteId)) {
        return (
          <>
            <ToastHost />
            <PinGate siteName={activeSite.name} pin={siteSettings.pin} onUnlock={()=>unlockSite(activeSiteId)} onBack={switchSite} />
          </>
        );
      }

      const active = TABS.find(t => t.key === tab) || TABS[2];
      const ActiveComponent = active.Component;

      return (
        <SiteContext.Provider value={{ siteId: activeSiteId, siteName: activeSite.name, sites, addSite, renameSite, deleteSite, switchSite }}>
          <ToastHost />
          <div className="app-header">
            <div>
              <div className="title">M Design Works · 현장 관리</div>
              <div className="subtitle">{activeSite.name} · {active.label}</div>
            </div>
            <button className="switch-site-btn" onClick={switchSite}>🏗 현장 변경</button>
          </div>

          {bannerOpen && (
            <div className="next-process-banner">
              <span className="badge">내일 예정</span>
              <span className="msg">{tomorrowTasks.map(t=>t.name).join(", ")} {tomorrowTasks.length>1 ? `(${tomorrowTasks.length}건)` : "공정이 시작됩니다"}</span>
              <button className="close" onClick={dismissBanner}>✕</button>
            </div>
          )}

          <div className="app-content">
            <ActiveComponent />
          </div>

          <div className="tabbar">
            {TABS.map(t => (
              <button key={t.key} className={tab===t.key ? "active" : ""} onClick={() => setTab(t.key)}>
                <span className="ic">{t.icon}{t.key==="schedule" && tomorrowTasks.length>0 && <span className="dot" />}</span>
                <span>{t.label}</span>
              </button>
            ))}
          </div>
        </SiteContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
