      return (
        <>
        <div className="placeholder-wrap" style={{ paddingTop: 36 }}>
          <div style={{ ...dl.card, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:12, color:"#a0aec0" }}>누적 총비용</div>
              <div style={{ fontSize:20, fontWeight:900, color:"#1a1a2e" }}>{fmtMoney(grandTotal)}</div>
            </div>
            <button style={{ background:"#FF6B35", color:"#fff", border:"none", borderRadius:10, padding:"12px 18px", fontSize:14, fontWeight:700, cursor:"pointer" }} onClick={openNew}>+ 새 작업일지</button>
          </div>

          {processOptions.length > 0 && (
            <div style={{ marginBottom:10 }}>
              <select value={filterProcess} onChange={e=>setFilterProcess(e.target.value)} style={dl.input}>
                <option value="">전체 공정</option>
                {processOptions.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
          )}

          {filtered.length === 0 ? (
            <div style={{ color:"#a0aec0", fontSize:14, padding:"40px 0", textAlign:"center" }}>작업일지가 없습니다. 새 작업일지를 추가해보세요.</div>
          ) : filtered.map(log => (
            <div key={log.id} style={dl.card} onClick={()=>openEdit(log)}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>{dayLabel(log.date)} · {getLogProcesses(log).join(" · ") || "공정 없음"}{log.photos?.length > 0 && <span style={{ marginLeft:6, fontSize:12, color:"#a0aec0" }}>📷 {log.photos.length}</span>}</div>
                  {log.area && <div style={{ fontSize:12, color:"#a0aec0", marginTop:2 }}>📍 {log.area}</div>}
                  {log.content && <div style={{ fontSize:13, color:"#4a5568", marginTop:6, lineHeight:1.5 }}>{log.content}</div>}
                  {log.photos?.length > 0 && (
                    <div style={{ display:"flex", gap:6, marginTop:8 }}>
                      {log.photos.slice(0,4).map((url,i) => (
                        <div key={i} onClick={(e)=>{ e.stopPropagation(); setGallery({ photos: log.photos.map(u=>({url:u})), index: i }); }} style={{ width:48, height:48, borderRadius:6, overflow:"hidden", border:"1px solid #e2e8f0", cursor:"pointer", flexShrink:0, position:"relative" }}>
                          <img src={url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                          {i===3 && log.photos.length>4 && (
                            <div style={{ position:"absolute", inset:0, background:"rgba(26,26,46,0.55)", color:"#fff", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>+{log.photos.length-4}</div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ textAlign:"right", flexShrink:0 }}>
                  <div style={{ fontSize:14, fontWeight:900, color:"#FF6B35" }}>{fmtMoney(log.totalCost)}</div>
                  <button onClick={(e)=>{ e.stopPropagation(); removeLog(log.id); }} className="x-remove-btn" style={{ ...dl.removeBtn, marginTop:4 }}>삭제</button>
                </div>
              </div>
            </div>
          ))}
        </div>
        {gallery && <PhotoLightbox gallery={gallery} setGallery={setGallery} />}
        </>
      );
    }

    function PhotoLightbox({ gallery, setGallery }) {
      const { photos, index } = gallery;
      const photo = photos[index];
      const src = photo.url || photo.previewUrl;
      const prev = (e) => { e.stopPropagation(); setGallery(g => ({ ...g, index: (g.index - 1 + photos.length) % photos.length })); };
      const next = (e) => { e.stopPropagation(); setGallery(g => ({ ...g, index: (g.index + 1) % photos.length })); };
      return (
        <div onClick={()=>setGallery(null)} style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000,
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>
          <button onClick={()=>setGallery(null)} style={{ position:"absolute", top:16, right:16, width:36, height:36, borderRadius:"50%", border:"none", background:"rgba(255,255,255,0.15)", color:"#fff", fontSize:18, cursor:"pointer" }}>×</button>
          {photos.length > 1 && (
            <div style={{ position:"absolute", top:16, left:16, color:"#fff", fontSize:13, background:"rgba(255,255,255,0.15)", borderRadius:8, padding:"4px 10px" }}>{index+1} / {photos.length}</div>
          )}
          {photos.length > 1 && (
            <button onClick={prev} style={{ position:"absolute", left:8, top:"50%", transform:"translateY(-50%)", width:44, height:44, borderRadius:"50%", border:"none", background:"rgba(255,255,255,0.15)", color:"#fff", fontSize:22, cursor:"pointer" }}>‹</button>
          )}
          <img src={src} alt="" onClick={e=>e.stopPropagation()} style={{ maxWidth:"92vw", maxHeight:"86vh", objectFit:"contain", borderRadius:8 }} />
          {photos.length > 1 && (
            <button onClick={next} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", width:44, height:44, borderRadius:"50%", border:"none", background:"rgba(255,255,255,0.15)", color:"#fff", fontSize:22, cursor:"pointer" }}>›</button>
          )}
        </div>
      );
    }

    const COST_COLORS = { labor:"#FF6B35", material:"#4472C4", equipment:"#48BB78", other:"#A0AEC0" };
    const COST_LABELS = { labor:"인건비", material:"자재비", equipment:"장비비", other:"기타" };

    function LogCostDetail({ log }) {
      const otherList = normalizeOtherCosts(log.otherCosts);
      const hasOther = otherList.some(o=>(Number(o.amount)||0)>0);
      const hasWorkers = (log.workers||[]).some(w=>w.role || (Number(w.laborCost)||0)>0);
      const hasMaterials = (log.materials||[]).some(m=>m.name || ((Number(m.qty)||0)*(Number(m.unitPrice)||0))>0);
      const hasEquipment = (log.equipment||[]).some(e=>e.name || (Number(e.cost)||0)>0);
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {hasWorkers && (
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:COST_COLORS.labor, marginBottom:4 }}>👷 인건비</div>
              {log.workers.filter(w=>w.role || (Number(w.laborCost)||0)>0).map((w,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#4a5568", padding:"2px 0" }}>
                  <span>{w.role || "인력"} {w.count}명</span>
                  <span>{fmtMoney(w.laborCost)}</span>
                </div>
              ))}
            </div>
          )}
          {hasMaterials && (
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:COST_COLORS.material, marginBottom:4 }}>📦 자재비</div>
              {log.materials.filter(m=>m.name || calcMaterialCost(m)>0).map((m,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#4a5568", padding:"2px 0" }}>
                  <span>{m.name || "자재"}{(Number(m.totalPrice)||0)>0 ? "" : (m.qty ? ` ${m.qty}${m.unit||""}` : "") + (m.unitPrice ? ` × ${fmtMoney(m.unitPrice)}` : "")}</span>
                  <span>{fmtMoney(calcMaterialCost(m))}</span>
                </div>
              ))}
            </div>
          )}
          {hasEquipment && (
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:COST_COLORS.equipment, marginBottom:4 }}>🛠 장비비</div>
              {log.equipment.filter(e=>e.name || (Number(e.cost)||0)>0).map((e,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#4a5568", padding:"2px 0" }}>
                  <span>{e.name || "장비"}</span>
                  <span>{fmtMoney(e.cost)}</span>
                </div>
              ))}
            </div>
          )}
          {hasOther && (
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:COST_COLORS.other, marginBottom:4 }}>💵 기타비용</div>
              {otherList.filter(o=>(Number(o.amount)||0)>0).map((o,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#4a5568", padding:"2px 0" }}><span>{o.name || "기타"}</span><span>{fmtMoney(o.amount)}</span></div>
              ))}
            </div>
          )}
          {!hasWorkers && !hasMaterials && !hasEquipment && !hasOther && (
            <div style={{ fontSize:12, color:"#a0aec0", padding:"4px 0" }}>등록된 세부 비용이 없습니다.</div>
          )}
          {log.note && <div style={{ fontSize:11, color:"#a0aec0", borderTop:"1px solid #f0f0f3", paddingTop:6 }}>📝 {log.note}</div>}
        </div>
      );
    }

    function CostTab() {
      const { siteId } = React.useContext(SiteContext);
      const [logs, setLogs] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [budget, setBudget] = useState(0);
      const [budgetInput, setBudgetInput] = useState("");
      const [editingBudget, setEditingBudget] = useState(false);
      const [quickEntry, setQuickEntry] = useState(false);
      const [quickForm, setQuickForm] = useState({ date: today, process: "", note: "", items: [{ name: "", amount: "" }] });
      const [quickSaving, setQuickSaving] = useState(false);

      // 빠른 인력 입력
      const [quickLabor, setQuickLabor] = useState(false);
      const [quickLaborForm, setQuickLaborForm] = useState({ date: today, process: "", note: "", workers: [{ role: "", count: 1, laborCost: "" }] });
      const [quickLaborSaving, setQuickLaborSaving] = useState(false);
      const openQuickLabor = () => {
        setQuickLaborForm({ date: today, process: "", note: "", workers: [{ role: "", count: 1, laborCost: "" }] });
        setQuickLabor(true);
      };
      const quickLaborUpdate = (i, field, value) => {
        setQuickLaborForm(f => { const workers = f.workers.map((w,wi) => wi===i ? {...w,[field]:value} : w); return {...f, workers}; });
      };
      const quickLaborAdd = () => setQuickLaborForm(f => ({...f, workers: [...f.workers, {role:"", count:1, laborCost:""}]}));
      const quickLaborRemove = (i) => setQuickLaborForm(f => ({...f, workers: f.workers.filter((_,wi)=>wi!==i)}));
      const quickLaborTotal = quickLaborForm.workers.reduce((s,w) => s + (Number(w.laborCost)||0), 0);
      const quickLaborManDays = quickLaborForm.workers.reduce((s,w) => s + (Number(w.count)||0), 0);
      const saveQuickLabor = async () => {
        const workers = quickLaborForm.workers.filter(w => w.role.trim() || (Number(w.count)||0) > 0 || (Number(w.laborCost)||0) > 0);
        if (workers.length === 0) { notify("팀/직종 정보를 입력해주세요."); return; }
        setQuickLaborSaving(true);
        const id = newId("log");
        const data = {
          siteId,
          date: quickLaborForm.date,
          process: quickLaborForm.process || "기타",
          area: "",
          content: quickLaborForm.note || "",
          workers: workers.map(w => ({ role: w.role||"인력", count: Number(w.count)||1, laborCost: Number(w.laborCost)||0 })),
          materials: [],
          equipment: [],
          otherCosts: [],
          note: quickLaborForm.note,
          totalCost: workers.reduce((s,w) => s+(Number(w.laborCost)||0), 0),
          photos: [],
        };
        await setDoc("dailyLogs", id, data);
        setLogs(prev => [...prev, { id, ...data }]);
        setQuickLaborSaving(false);
        setQuickLabor(false);
        notify("인력이 저장되었습니다.", "success");
      };

      const openQuickEntry = () => {
        setQuickForm({ date: today, process: "", note: "", items: [{ name: "", amount: "" }] });
        setQuickEntry(true);
      };
      const quickUpdateItem = (i, field, value) => {
        setQuickForm(f => { const items = f.items.map((it,ii) => ii===i ? {...it,[field]:value} : it); return {...f, items}; });
      };
      const quickAddItem = () => setQuickForm(f => ({...f, items: [...f.items, {name:"", amount:""}]}));
      const quickRemoveItem = (i) => setQuickForm(f => ({...f, items: f.items.filter((_,ii)=>ii!==i)}));
      const quickTotal = quickForm.items.reduce((s,it) => s + (Number(it.amount)||0), 0);

      const saveQuickEntry = async () => {
        const items = quickForm.items.filter(it => it.name.trim() || (Number(it.amount)||0) > 0);
        if (items.length === 0 && quickTotal === 0) { notify("항목과 금액을 입력해주세요."); return; }
        setQuickSaving(true);
        const id = newId("log");
        const data = {
          siteId,
          date: quickForm.date,
          process: quickForm.process || "기타",
          area: "",
          content: quickForm.note || "",
          workers: [],
          materials: [],
          equipment: [],
          otherCosts: items.map(it => ({ name: it.name || "비용", amount: Number(it.amount)||0, ...(it.process ? { process: it.process } : {}) })),
          note: quickForm.note,
          totalCost: items.reduce((s,it) => s+(Number(it.amount)||0), 0),
          photos: [],
        };
        await setDoc("dailyLogs", id, data);
        setLogs(prev => [...prev, { id, ...data }]);
        setQuickSaving(false);
        setQuickEntry(false);
        notify("비용이 저장되었습니다.", "success");
      };

      useEffect(() => {
        (async () => {
          const [data, settings] = await Promise.all([fetchCollection("dailyLogs", siteId), getSiteSettings(siteId)]);
          setLogs(data);
          const b = Number(settings?.budget) || 0;
          setBudget(b);
          setBudgetInput(b ? String(b) : "");
          setLoaded(true);
        })();
      }, [siteId]);

      const saveBudget = async () => {
        const v = Math.max(0, Number(budgetInput) || 0);
        setBudget(v);
        setEditingBudget(false);
        await saveSiteSettings(siteId, { budget: v });
      };

      const totalCost = useMemo(() => logs.reduce((s,l) => s + (Number(l.totalCost)||0), 0), [logs]);
      const vatAmount = Math.round(totalCost * 0.1);
      const totalWithVat = totalCost + vatAmount;

      const weekCost = useMemo(() => {
        const w = new Date(); w.setDate(w.getDate()-6);
        const wStr = fmtDate(w);
        return logs.filter(l => l.date >= wStr).reduce((s,l) => s + (Number(l.totalCost)||0), 0);
      }, [logs]);

      const breakdown = useMemo(() => {
        const b = { labor:0, material:0, equipment:0, other:0 };
        logs.forEach(l => {
          b.labor += (l.workers||[]).reduce((s,w) => s + (Number(w.laborCost)||0), 0);
          b.material += (l.materials||[]).reduce((s,m) => s + calcMaterialCost(m), 0);
          b.equipment += (l.equipment||[]).reduce((s,e) => s + (Number(e.cost)||0), 0);
          b.other += otherCostsTotal(l.otherCosts);
        });
        return b;
      }, [logs]);

      const breakdownTotal = breakdown.labor + breakdown.material + breakdown.equipment + breakdown.other;
      const conicGradient = useMemo(() => {
        if (!breakdownTotal) return "#e2e8f0";
        let acc = 0;
        const parts = ["labor","material","equipment","other"].map(k => {
          const pct = breakdown[k] / breakdownTotal * 100;
          const start = acc; acc += pct;
          return `${COST_COLORS[k]} ${start}% ${acc}%`;
        });
        return `conic-gradient(${parts.join(", ")})`;
      }, [breakdown, breakdownTotal]);

      const byProcess = useMemo(() => {
        const map = {};
        logs.forEach(l => {
          const logProc = l.process || "기타";
          // 인건비 · 자재비 · 장비비 → 일지 공정으로
          const laborCost = (l.workers||[]).reduce((s,w) => s+(Number(w.laborCost)||0), 0);
          const matCost = (l.materials||[]).reduce((s,m) => s+calcMaterialCost(m), 0);
          const eqCost = (l.equipment||[]).reduce((s,e) => s+(Number(e.cost)||0), 0);
          if (laborCost) map[logProc] = (map[logProc]||0) + laborCost;
          if (matCost)   map[logProc] = (map[logProc]||0) + matCost;
          if (eqCost)    map[logProc] = (map[logProc]||0) + eqCost;
          // 기타비용 → 항목별 공정 사용 (없으면 현장공통 — 식대·운반비 등은 공정과 무관)
          normalizeOtherCosts(l.otherCosts).forEach(o => {
            const ocProc = o.process || "현장공통";
            map[ocProc] = (map[ocProc]||0) + (Number(o.amount)||0);
          });
        });
        return Object.entries(map).filter(([,v])=>v>0).sort((a,b) => b[1]-a[1]);
      }, [logs]);
      const maxProcessCost = byProcess.length ? byProcess[0][1] : 0;

      const logsByProcess = useMemo(() => {
        const map = {};
        logs.forEach(l => { const key = l.process || "기타"; (map[key] = map[key] || []).push(l); });
        Object.values(map).forEach(arr => arr.sort((a,b) => b.date.localeCompare(a.date) || (b.id||"").localeCompare(a.id||"")));
        return map;
      }, [logs]);
      const [expandedProcess, setExpandedProcess] = useState(null);
      const toggleProcess = (name) => setExpandedProcess(p => p === name ? null : name);

      const cumulative = useMemo(() => {
        const map = {};
        logs.forEach(l => { map[l.date] = (map[l.date]||0) + (Number(l.totalCost)||0); });
        const dates = Object.keys(map).sort();
        let sum = 0;
        return dates.map(d => { sum += map[d]; return { date: d, value: sum }; });
      }, [logs]);

      const maxCum = Math.max(1, budget, ...cumulative.map(c => c.value));
      const linePoints = cumulative.map((c,i) => ({
        x: cumulative.length > 1 ? (i/(cumulative.length-1)) * 280 : 140,
        y: 100 - (c.value/maxCum) * 90,
      }));
      const pathD = linePoints.length ? "M" + linePoints.map(p => `${p.x},${p.y}`).join(" L") : "";
      const budgetY = budget ? 100 - (budget/maxCum) * 90 : null;

      const remaining = budget - totalCost;
      const usedPct = budget ? Math.round(totalCost/budget*100) : null;

      const sortedLogs = useMemo(() => [...logs].sort((a,b) => b.date.localeCompare(a.date) || (b.id||"").localeCompare(a.id||"")), [logs]);
      const [expandedLogs, setExpandedLogs] = useState({});
      const toggleLog = (id) => setExpandedLogs(e => ({ ...e, [id]: !e[id] }));

      // 인력 서브뷰
      const [costView, setCostView] = useState("cost");
      const [expandedLaborLog, setExpandedLaborLog] = useState({});
      const toggleLaborLog = (id) => setExpandedLaborLog(e => ({ ...e, [id]: !e[id] }));
      const [laborEditId, setLaborEditId] = useState(null);
      const [laborEditWorkers, setLaborEditWorkers] = useState([]);
      const startLaborEdit = (log, workers) => {
        setLaborEditId(log.id);
        setLaborEditWorkers(workers.length ? workers.map(w=>({...w})) : [{ role:"", count:1, laborCost:0 }]);
      };
      const cancelLaborEdit = () => { setLaborEditId(null); setLaborEditWorkers([]); };
      const saveLaborEdit = async (logId) => {
        const ws = laborEditWorkers.filter(w => w.role.trim() || (Number(w.count)||0) > 0);
        const newTotal = ws.reduce((s,w) => s + (Number(w.laborCost)||0), 0);
        // 기존 로그의 totalCost에서 인건비 부분만 교체
        const log = logs.find(l => l.id === logId);
        const oldLabor = (log.workers||[]).reduce((s,w) => s+(Number(w.laborCost)||0), 0);
        const oldTotal = Number(log.totalCost)||0;
        const newTotalCost = oldTotal - oldLabor + newTotal;
        const patch = { workers: ws, totalCost: newTotalCost };
        setLogs(ls => ls.map(l => l.id === logId ? { ...l, ...patch } : l));
        await setDoc("dailyLogs", logId, patch);
        setLaborEditId(null); setLaborEditWorkers([]);
      };

      const laborSummary = useMemo(() => {
        let totalManDays = 0, totalLaborCost = 0;
        const byProcess = {};
        const byRole = {};
        const byDate = [];
        const logsWithWorkers = sortedLogs.filter(l => (l.workers||[]).some(w => w.role || (Number(w.count)||0) > 0 || (Number(w.laborCost)||0) > 0));
        logsWithWorkers.forEach(l => {
          const ws = (l.workers||[]).filter(w => w.role || (Number(w.count)||0) > 0 || (Number(w.laborCost)||0) > 0);
          let dayManDays = 0, dayLaborCost = 0;
          ws.forEach(w => {
            const cnt = Number(w.count) || 1;
            const cost = Number(w.laborCost) || 0;
            totalManDays += cnt; dayManDays += cnt;
            totalLaborCost += cost; dayLaborCost += cost;
            const proc = l.process || "기타";
            if (!byProcess[proc]) byProcess[proc] = { manDays:0, laborCost:0 };
            byProcess[proc].manDays += cnt; byProcess[proc].laborCost += cost;
            const role = w.role || "미분류";
            if (!byRole[role]) byRole[role] = { manDays:0, laborCost:0 };
            byRole[role].manDays += cnt; byRole[role].laborCost += cost;
          });
          byDate.push({ log: l, workers: ws, manDays: dayManDays, laborCost: dayLaborCost });
        });
        return {
          totalManDays, totalLaborCost,
          byProcess: Object.entries(byProcess).sort((a,b) => b[1].manDays - a[1].manDays),
          byRole: Object.entries(byRole).sort((a,b) => b[1].manDays - a[1].manDays),
          byDate,
        };
      }, [sortedLogs]);

      if (!loaded) return <div style={{ padding:32, color:"#a0aec0", textAlign:"center" }}>불러오는 중...</div>;

      return (
        <div className="placeholder-wrap">
          {/* 서브탭 토글 */}
          <div style={{ display:"flex", background:"#f7f8fa", borderRadius:10, padding:3, marginBottom:12, gap:3 }}>
            <button onClick={()=>setCostView("cost")} style={{ flex:1, padding:"8px 0", borderRadius:8, border:"none", fontSize:13, fontWeight:700, cursor:"pointer", background: costView==="cost" ? "#fff" : "transparent", color: costView==="cost" ? "#FF6B35" : "#a0aec0", boxShadow: costView==="cost" ? "0 1px 4px rgba(0,0,0,0.08)" : "none", transition:"all 0.15s" }}>💰 비용</button>
            <button onClick={()=>setCostView("labor")} style={{ flex:1, padding:"8px 0", borderRadius:8, border:"none", fontSize:13, fontWeight:700, cursor:"pointer", background: costView==="labor" ? "#fff" : "transparent", color: costView==="labor" ? "#FF6B35" : "#a0aec0", boxShadow: costView==="labor" ? "0 1px 4px rgba(0,0,0,0.08)" : "none", transition:"all 0.15s" }}>👷 인력투입</button>
          </div>

          {/* ── 비용 뷰 ── */}
          {costView === "cost" && <>

          {/* 빠른 비용 입력 버튼 */}
          {!quickEntry && (
            <div style={{ marginBottom:10 }}>
              <button onClick={openQuickEntry} style={{ ...dl.primaryBtn, fontSize:14 }}>💰 빠른 비용 입력</button>
            </div>
          )}

          {/* 빠른 비용 입력 폼 */}
          {quickEntry && (
            <div style={{ ...dl.card, marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:700, color:"#1a1a2e" }}>💰 빠른 비용 입력</div>
                <button onClick={()=>setQuickEntry(false)} style={{ background:"none", border:"none", color:"#a0aec0", fontSize:18, cursor:"pointer", lineHeight:1 }}>×</button>
              </div>
              <div style={{ display:"flex", gap:6, marginBottom:8 }}>
                <div style={{ flex:1 }}>
                  <label style={dl.label}>날짜</label>
                  <input type="date" value={quickForm.date} onChange={e=>setQuickForm(f=>({...f,date:e.target.value}))} style={dl.input} />
                </div>
                <div style={{ flex:1 }}>
                  <label style={dl.label}>공정 (선택)</label>
                  <select value={quickForm.process} onChange={e=>setQuickForm(f=>({...f,process:e.target.value}))} style={dl.input}>
                    <option value="">선택 안 함 → 기타</option>
                    {PROCESS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
              </div>
              <label style={dl.label}>비용 항목 <span style={{ fontWeight:400, color:"#a0aec0", fontSize:11 }}>(항목별 공정을 따로 지정할 수 있어요)</span></label>
              {quickForm.items.map((it,i) => (
                <div key={i} style={{ marginBottom:8 }}>
                  <div style={{ display:"flex", gap:6, marginBottom:3, alignItems:"center" }}>
                    <input value={it.name} onChange={e=>quickUpdateItem(i,"name",e.target.value)} placeholder="항목명 (예: 식대, 폐기물처리비)" style={{...dl.input, flex:2}} />
                    <input type="number" value={it.amount} onChange={e=>quickUpdateItem(i,"amount",e.target.value)} onFocus={e=>e.target.select()} placeholder="금액" style={{...dl.input, flex:1}} />
                    {quickForm.items.length > 1 && <button onClick={()=>quickRemoveItem(i)} className="x-remove-btn" style={dl.removeBtn}>×</button>}
                  </div>
                  <select value={it.process||""} onChange={e=>quickUpdateItem(i,"process",e.target.value)} style={{ width:"100%", fontSize:11, padding:"4px 8px", border:"1px solid #e2e8f0", borderRadius:6, outline:"none", color: it.process ? "#2d3748" : "#a0aec0", background:"#f7f8fa" }}>
                    <option value="">공정 지정 안 함 → 위 공정 따름</option>
                    <option value="현장공통">🏗️ 현장공통 (식대·교통비·폐기물 등)</option>
                    {PROCESS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
              ))}
              <button style={dl.smallBtn} onClick={quickAddItem}>+ 항목 추가</button>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", margin:"10px 0 6px" }}>
                <span style={{ fontSize:12, color:"#a0aec0" }}>합계</span>
                <span style={{ fontSize:18, fontWeight:900, color:"#FF6B35" }}>{fmtMoney(quickTotal)}</span>
              </div>
              <input value={quickForm.note} onChange={e=>setQuickForm(f=>({...f,note:e.target.value}))} placeholder="메모 (선택사항)" style={{...dl.input, marginBottom:10}} />
              <div style={{ display:"flex", gap:8 }}>
                <button style={dl.secondaryBtn} onClick={()=>setQuickEntry(false)}>취소</button>
                <button style={{...dl.primaryBtn, opacity:quickSaving?0.6:1}} disabled={quickSaving} onClick={saveQuickEntry}>{quickSaving?"저장 중...":"저장"}</button>
              </div>
            </div>
          )}

          {/* 누적 / 주간 비용 */}
          <div style={{ display:"flex", gap:10, marginBottom:10 }}>
            <div style={{ flex:1, background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px" }}>
              <div style={{ fontSize:12, color:"#a0aec0" }}>누적 비용</div>
              <div style={{ fontSize:18, fontWeight:900, color:"#1a1a2e" }}>{fmtMoney(totalCost)}</div>
              <div style={{ fontSize:11, color:"#a0aec0", marginTop:2 }}>VAT(10%) 포함 {fmtMoney(totalWithVat)}</div>
            </div>
            <div style={{ flex:1, background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px" }}>
              <div style={{ fontSize:12, color:"#a0aec0" }}>최근 7일 비용</div>
              <div style={{ fontSize:18, fontWeight:900, color:"#1a1a2e" }}>{fmtMoney(weekCost)}</div>
            </div>
          </div>

          {/* 예산 대비 실비 */}
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontSize:12, color:"#a0aec0" }}>예산 대비 실비</div>
              {!editingBudget && (
                <button onClick={() => { setBudgetInput(budget ? String(budget) : ""); setEditingBudget(true); }} style={{ background:"none", border:"none", color:"#FF6B35", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                  {budget ? "예산 수정" : "예산 설정"}
                </button>
              )}
            </div>
            {editingBudget ? (
              <div style={{ display:"flex", gap:6 }}>
                <input type="number" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} onFocus={e=>e.target.select()} placeholder="예산 입력 (원)" style={{ flex:1, padding:"10px 12px", fontSize:14, borderRadius:8, border:"1.5px solid #e2e8f0", outline:"none", color:"#2d3748" }} />
                <button onClick={saveBudget} style={{ background:"#FF6B35", color:"#fff", border:"none", borderRadius:8, padding:"0 16px", fontSize:13, fontWeight:700, cursor:"pointer" }}>저장</button>
              </div>
            ) : budget ? (
              <>
                <div style={{ fontSize:18, fontWeight:900, color: remaining<0 ? "#e53e3e" : "#1a1a2e" }}>
                  {fmtMoney(totalCost)} <span style={{ fontSize:12, fontWeight:500, color:"#a0aec0" }}>/ {fmtMoney(budget)}</span>
                </div>
                <div style={{ marginTop:6, height:6, borderRadius:4, background:"#edf2f7", overflow:"hidden" }}>
                  <div style={{ width:`${Math.min(100,usedPct)}%`, height:"100%", background: usedPct>100 ? "#e53e3e" : "#FF6B35", borderRadius:4 }} />
                </div>
                <div style={{ fontSize:11, color: remaining<0 ? "#e53e3e" : "#a0aec0", marginTop:4 }}>
                  {remaining>=0 ? `잔여 예산 ${fmtMoney(remaining)} (${usedPct}% 사용)` : `예산 초과 ${fmtMoney(-remaining)} (${usedPct}% 사용)`}
                </div>
                <div style={{ fontSize:11, color:"#a0aec0", marginTop:2 }}>VAT(10%) 포함 실비 {fmtMoney(totalWithVat)}</div>
              </>
            ) : (
              <div style={{ fontSize:13, color:"#a0aec0" }}>예산을 설정하면 진행 상황을 비교할 수 있습니다.</div>
            )}
          </div>

          {/* 날짜별 누적 비용 */}
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:8 }}>날짜별 누적 비용</div>
            {cumulative.length === 0 ? (
              <div style={{ fontSize:12, color:"#a0aec0", textAlign:"center", padding:"20px 0" }}>작업일지를 등록하면 그래프가 표시됩니다.</div>
            ) : (
              <>
                <svg viewBox="0 0 280 110" style={{ width:"100%", height:120, overflow:"visible" }} preserveAspectRatio="none">
                  {budgetY !== null && budgetY >= 0 && budgetY <= 100 && (
                    <line x1="0" y1={budgetY} x2="280" y2={budgetY} stroke="#e53e3e" strokeDasharray="4 3" strokeWidth="1" />
                  )}
                  <path d={pathD} fill="none" stroke="#FF6B35" strokeWidth="2" />
                  {linePoints.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r="2.5" fill="#FF6B35" />)}
                </svg>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#a0aec0", marginTop:4 }}>
                  <span>{dayLabel(cumulative[0].date)}</span>
                  <span>{dayLabel(cumulative[cumulative.length-1].date)}</span>
                </div>
              </>
            )}
          </div>

          {/* 항목별 비용 비중 */}
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:10 }}>항목별 비용 비중</div>
            {breakdownTotal === 0 ? (
              <div style={{ fontSize:12, color:"#a0aec0", textAlign:"center", padding:"10px 0" }}>등록된 비용 데이터가 없습니다.</div>
            ) : (
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <div style={{ width:88, height:88, borderRadius:"50%", background:conicGradient, flexShrink:0 }} />
                <div style={{ flex:1, display:"flex", flexDirection:"column", gap:6 }}>
                  {["labor","material","equipment","other"].map(k => (
                    <div key={k} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"#4a5568" }}>
                      <span style={{ width:10, height:10, borderRadius:3, background:COST_COLORS[k], flexShrink:0 }} />
                      <span style={{ flex:1 }}>{COST_LABELS[k]}</span>
                      <span style={{ fontWeight:700, color:"#1a1a2e" }}>{breakdownTotal ? Math.round(breakdown[k]/breakdownTotal*100) : 0}%</span>
                      <span style={{ color:"#a0aec0", minWidth:70, textAlign:"right" }}>{fmtMoney(breakdown[k])}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* 공종별 비용 */}
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:10 }}>공종별 비용</div>
            {byProcess.length === 0 ? (
              <div style={{ fontSize:12, color:"#a0aec0", textAlign:"center", padding:"10px 0" }}>등록된 비용 데이터가 없습니다.</div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {byProcess.map(([name, cost]) => {
                  const open = expandedProcess === name;
                  return (
                  <div key={name}>
                    <div onClick={()=>toggleProcess(name)} style={{ display:"flex", justifyContent:"space-between", fontSize:11.5, color:"#4a5568", marginBottom:3, cursor:"pointer", alignItems:"center", gap:6 }}>
                      <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"60%" }}>{name}</span>
                      <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <span style={{ fontWeight:700, color:"#1a1a2e" }}>{fmtMoney(cost)}</span>
                        <span style={{ fontSize:10, color:"#a0aec0" }}>{open ? "▲" : "▼"}</span>
                      </span>
                    </div>
                    <div style={{ height:8, borderRadius:4, background:"#edf2f7", overflow:"hidden" }}>
                      <div style={{ width:`${maxProcessCost ? (cost/maxProcessCost*100) : 0}%`, height:"100%", background:"#FF6B35", borderRadius:4 }} />
                    </div>
                    {open && (
                      <div style={{ marginTop:8, display:"flex", flexDirection:"column", gap:6 }}>
                        {(logsByProcess[name]||[]).map(log => (
                          <div key={log.id} style={{ background:"#f7f8fa", borderRadius:8, padding:"8px 10px" }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12, fontWeight:700, color:"#1a1a2e", marginBottom:6 }}>
                              <span>{dayLabel(log.date)}{log.area ? ` · ${log.area}` : ""}</span>
                              <span style={{ color:"#FF6B35" }}>{fmtMoney(log.totalCost)}</span>
                            </div>
                            <LogCostDetail log={log} />
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* 날짜별 비용 내역 */}
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:10 }}>날짜별 비용 내역</div>
            {sortedLogs.length === 0 ? (
              <div style={{ fontSize:12, color:"#a0aec0", textAlign:"center", padding:"10px 0" }}>등록된 비용 데이터가 없습니다.</div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {sortedLogs.map(log => {
                  const open = !!expandedLogs[log.id];
                  return (
                    <div key={log.id} style={{ border:"1px solid #f0f0f3", borderRadius:8 }}>
                      <div onClick={()=>toggleLog(log.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 12px", cursor:"pointer" }}>
                        <div>
                          <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>{dayLabel(log.date)}</div>
                          <div style={{ fontSize:11, color:"#a0aec0", marginTop:2 }}>{log.process}{log.area ? ` · ${log.area}` : ""}</div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <span style={{ fontSize:14, fontWeight:900, color:"#FF6B35" }}>{fmtMoney(log.totalCost)}</span>
                          <span style={{ fontSize:11, color:"#a0aec0" }}>{open ? "▲" : "▼"}</span>
                        </div>
                      </div>
                      {open && (
                        <div style={{ padding:"8px 12px 12px", borderTop:"1px solid #f7f8fa" }}>
                          <LogCostDetail log={log} />
                        </div>
                      )}
                    </div>
                  );

          {/* ── 인력투입 뷰 ── */}
          {costView === "labor" && (

              {laborSummary.byDate.length === 0 ? (

                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:10 }}>공정별 투입 현황</div>
                {laborSummary.byProcess.map(([proc, val]) => (
                  <div key={proc} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid #f7f8fa" }}>
                    <div style={{ flex:1 }}>

                      <div style={{ fontSize:11, color:"#a0aec0", marginTop:1 }}>{val.manDays}인·일 · {fmtMoney(val.laborCost)}</div>

                    <div style={{ width:80, height:6, background:"#f0f0f3", borderRadius:4, overflow:"hidden" }}>
                      <div style={{ height:"100%", borderRadius:4, background:"#4472C4", width:`${Math.round(val.manDays/laborSummary.totalManDays*100)}%` }} />
                    </div>
                    <div style={{ fontSize:12, fontWeight:700, color:"#4472C4", minWidth:32, textAlign:"right" }}>{Math.round(val.manDays/laborSummary.totalManDays*100)}%</div>
                  </div>
                ))}
              </div>

              {/* 날짜별 상세 */}
              <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:10 }}>날짜별 인력 투입 내역</div>
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  {laborSummary.byDate.map(({ log, workers, manDays, laborCost }) => {
                    const open = !!expandedLaborLog[log.id];
                    return (
                      <div key={log.id} style={{ border:"1px solid #f0f0f3", borderRadius:8, overflow:"hidden" }}>
                        <div onClick={()=>toggleLaborLog(log.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 12px", cursor:"pointer", background: open ? "#fffbf5" : "#fff" }}>
                          <div>
                            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>{dayLabel(log.date)}</div>
                            <div style={{ fontSize:11, color:"#a0aec0", marginTop:2 }}>{log.process || "기타"} · {manDays}인·일</div>
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ fontSize:13, fontWeight:900, color:"#FF6B35" }}>{fmtMoney(laborCost)}</span>
                            <span style={{ fontSize:11, color:"#a0aec0" }}>{open ? "▲" : "▼"}</span>

                        </div>
                        {open && (
                          <div style={{ padding:"8px 12px 12px", borderTop:"1px solid #f7f8fa" }}>
                            {laborEditId === log.id ? (

                              <div>
                                {laborEditWorkers.map((w,i) => (
                                  <div key={i} style={{ display:"flex", gap:4, marginBottom:5, alignItems:"center" }}>
                                    <input value={w.role} onChange={e=>setLaborEditWorkers(ws=>ws.map((x,j)=>j===i?{...x,role:e.target.value}:x))} placeholder="팀·직종 (예: 조적공)" style={{ flex:3, fontSize:12, padding:"5px 7px", border:"1px solid #e2e8f0", borderRadius:5, outline:"none" }} />
                                    <input type="number" inputMode="numeric" value={w.count} onChange={e=>setLaborEditWorkers(ws=>ws.map((x,j)=>j===i?{...x,count:e.target.value}:x))} onFocus={e=>e.target.select()} placeholder="인원" style={{ flex:1, fontSize:12, padding:"5px 4px", border:"1px solid #e2e8f0", borderRadius:5, outline:"none", textAlign:"center" }} />
                                    <input type="number" inputMode="numeric" value={w.laborCost} onChange={e=>setLaborEditWorkers(ws=>ws.map((x,j)=>j===i?{...x,laborCost:e.target.value}:x))} onFocus={e=>e.target.select()} placeholder="인건비" style={{ flex:2, fontSize:12, padding:"5px 4px", border:"1px solid #e2e8f0", borderRadius:5, outline:"none" }} />
                                    {laborEditWorkers.length > 1 && <button onClick={()=>setLaborEditWorkers(ws=>ws.filter((_,j)=>j!==i))} style={{ background:"none", border:"none", color:"#e53e3e", fontSize:16, cursor:"pointer", padding:"0 2px", lineHeight:1 }}>×</button>}
                                  </div>
                                ))}
                                <button onClick={()=>setLaborEditWorkers(ws=>[...ws,{role:"",count:1,laborCost:0}])} style={{ fontSize:11, color:"#a0aec0", background:"none", border:"1px dashed #cbd5e0", borderRadius:5, padding:"3px 8px", cursor:"pointer", marginBottom:8 }}>+ 행 추가</button>
                                <div style={{ display:"flex", gap:6 }}>
                                  <button onClick={cancelLaborEdit} style={{ flex:1, padding:"7px 0", border:"1px solid #e2e8f0", borderRadius:6, background:"none", color:"#718096", fontSize:12, cursor:"pointer" }}>취소</button>
                                  <button onClick={()=>saveLaborEdit(log.id)} style={{ flex:2, padding:"7px 0", border:"none", borderRadius:6, background:"#FF6B35", color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer" }}>저장</button>
                                </div>
                              </div>
                            ) : (
                              /* ── 읽기 모드 ── */
                              <>
                                <div style={{ display:"flex", padding:"4px 0 6px", borderBottom:"1px solid #f0f0f3", marginBottom:4 }}>
                                  <span style={{ flex:2, fontSize:11, fontWeight:700, color:"#a0aec0" }}>팀·직종</span>
                                  <span style={{ flex:1, fontSize:11, fontWeight:700, color:"#a0aec0", textAlign:"center" }}>인원</span>
                                  <span style={{ flex:2, fontSize:11, fontWeight:700, color:"#a0aec0", textAlign:"right" }}>인건비</span>
                                </div>
                                {workers.map((w,i) => (
                                  <div key={i} style={{ display:"flex", alignItems:"center", padding:"5px 0", borderBottom:"1px solid #f7f8fa" }}>
                                    <span style={{ flex:2, fontSize:13, color:"#2d3748", fontWeight:600 }}>{w.role || "미분류"}</span>
                                    <span style={{ flex:1, fontSize:13, color:"#2d3748", textAlign:"center" }}>{Number(w.count)||1}명</span>
                                    <span style={{ flex:2, fontSize:13, color:"#FF6B35", fontWeight:700, textAlign:"right" }}>{fmtMoney(Number(w.laborCost)||0)}</span>
                                  </div>

                                  <span style={{ fontSize:12, color:"#a0aec0" }}>소계  {manDays}인·일 · {fmtMoney(laborCost)}</span>
                                  <button onClick={()=>startLaborEdit(log, workers)} style={{ background:"none", border:"1px solid #e2e8f0", borderRadius:5, padding:"3px 8px", fontSize:11, color:"#718096", cursor:"pointer" }}>✏️ 수정</button>

                        )}

                    );
                  })}
                </div>
              </div>

              </>)}
            </div>
          )}

        </div>
      );
    }

    const MATERIAL_STATUS = ["필요", "주문완료", "입고완료"];
    const MATERIAL_STATUS_COLOR = { "필요":"#ED8936", "주문완료":"#4472C4", "입고완료":"#48BB78" };

    function MaterialTracker({ logs = [] }) {
      const { siteId } = React.useContext(SiteContext);
      const [items, setItems] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [adding, setAdding] = useState(false);
      const [form, setForm] = useState({ name:"", spec:"", qty:"", unit:"", note:"", minQty:"" });
      const [showLogMats, setShowLogMats] = useState(false);

      // 일지에서 사용된 자재 집계 (이름 기준)
      const logMaterials = useMemo(() => {
        const map = {};
        logs.forEach(l => {
          (l.materials||[]).filter(m => m.name && m.name.trim()).forEach(m => {
            const key = m.name.trim();
            if (!map[key]) map[key] = { name: key, unit: m.unit||"", totalQty: 0, totalCost: 0, uses: [] };
            const qty = Number(m.qty)||0;
            const cost = calcMaterialCost(m);
            map[key].totalQty += qty;
            map[key].totalCost += cost;
            map[key].uses.push({ date: l.date, process: l.process||"기타", qty, cost });
          });
        });
        return Object.values(map).sort((a,b) => b.totalCost - a.totalCost);
      }, [logs]);

      useEffect(() => { (async () => { setItems(await fetchCollection("materials", siteId)); setLoaded(true); })(); }, [siteId]);

      const sorted = [...items].sort((a,b) => (a.createdAt||"").localeCompare(b.createdAt||""));

      const addItem = async () => {
        if (!form.name.trim()) return;
        const id = newId("mat");
        const data = { siteId, name:form.name, spec:form.spec, qty:form.qty, unit:form.unit, note:form.note, minQty:form.minQty, status:"필요", createdAt: new Date().toISOString() };
        setItems(its => [...its, { id, ...data }]);
        setForm({ name:"", spec:"", qty:"", unit:"", note:"", minQty:"" });
        setAdding(false);
        await setDoc("materials", id, data);
      };

      const cycleStatus = async (item) => {
        const idx = MATERIAL_STATUS.indexOf(item.status||"필요");
        const next = MATERIAL_STATUS[(idx+1) % MATERIAL_STATUS.length];
        setItems(its => its.map(i => i.id===item.id ? {...i, status:next} : i));
        await setDoc("materials", item.id, { status: next });
      };

      const removeItem = async (id) => {
        setItems(its => its.filter(i => i.id !== id));
        await deleteDocFn("materials", id);
      };

      const quickAddFromLog = async (mat) => {
        const id = newId("mat");
        const data = { siteId, name: mat.name, spec:"", qty:"", unit: mat.unit||"", note:"", minQty:"", status:"필요", createdAt: new Date().toISOString() };
        setItems(its => [...its, { id, ...data }]);
        await setDoc("materials", id, data);
        notify(`"${mat.name}" 발주 트래커에 추가됐습니다.`, "success");
      };

      if (!loaded) return null;

      return (
        <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>자재 발주 트래커</div>
            <button onClick={()=>setAdding(a=>!a)} style={{ background:"none", border:"none", color:"#FF6B35", fontSize:12, fontWeight:700, cursor:"pointer" }}>{adding?"닫기":"+ 추가"}</button>
          </div>
          {adding && (
            <div style={{ marginBottom:10, padding:10, background:"#f7f8fa", borderRadius:8 }}>
              <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="자재명" style={{...dl.input, flex:2}} />
                <input value={form.spec} onChange={e=>setForm(f=>({...f,spec:e.target.value}))} placeholder="규격" style={{...dl.input, flex:1}} />
              </div>
              <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                <input type="number" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))} onFocus={e=>e.target.select()} placeholder="수량" style={{...dl.input, flex:1}} />
                <input value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))} placeholder="단위" style={{...dl.input, flex:1}} />
                <input type="number" value={form.minQty} onChange={e=>setForm(f=>({...f,minQty:e.target.value}))} onFocus={e=>e.target.select()} placeholder="최소 보유량" style={{...dl.input, flex:1}} />
              </div>
              <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="메모 (업체, 예상 입고일 등)" style={{...dl.input, marginBottom:6}} />
              <button onClick={addItem} style={{ ...dl.primaryBtn, padding:"10px 0", fontSize:13 }}>추가</button>
            </div>
          )}
          {sorted.length === 0 ? (
            <div style={{ fontSize:12, color:"#a0aec0", textAlign:"center", padding:"10px 0" }}>등록된 자재가 없습니다.</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {sorted.map(item => {
                const low = item.minQty !== undefined && item.minQty !== "" && Number(item.qty) <= Number(item.minQty);
                return (
                <div key={item.id} style={{
                  display:"flex", alignItems:"center", gap:8, padding:"8px 8px", borderBottom:"1px solid #f0f0f3",
                  background: low ? "#FFF5F5" : "transparent", borderRadius: low ? 8 : 0,
                  border: low ? `1px solid ${DELAY_COLOR}` : "none",
                }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:4 }}>
                      {low && <span title="재고 부족" style={{ fontSize:11, color:DELAY_COLOR, flexShrink:0 }}>⚠️</span>}
                      <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}{item.spec && <span style={{ fontWeight:500, color:"#a0aec0" }}> · {item.spec}</span>}</span>
                    </div>
                    <div style={{ fontSize:11, color: low ? DELAY_COLOR : "#a0aec0", marginTop:2, fontWeight: low ? 700 : 400 }}>
                      {item.qty}{item.unit}{item.minQty!=="" && item.minQty!==undefined && ` (최소 ${item.minQty}${item.unit})`}{item.note && ` · ${item.note}`}
                      {low && " · 재고 부족"}
                    </div>
                  </div>
                  <button onClick={()=>cycleStatus(item)} style={{ background:MATERIAL_STATUS_COLOR[item.status||"필요"], color:"#fff", border:"none", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, cursor:"pointer", flexShrink:0 }}>{item.status||"필요"}</button>
                  <button onClick={()=>removeItem(item.id)} className="x-remove-btn" style={dl.removeBtn}>×</button>
                </div>
              );})}
            </div>
          )}

          {/* 일지에서 사용된 자재 */}
          {logMaterials.length > 0 && (
            <div style={{ marginTop:14, borderTop:"1px solid #e2e8f0", paddingTop:12 }}>
              <div onClick={()=>setShowLogMats(v=>!v)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", marginBottom: showLogMats ? 10 : 0 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#4a5568" }}>📋 일지에서 사용된 자재 ({logMaterials.length}종)</div>
                <span style={{ fontSize:11, color:"#a0aec0" }}>{showLogMats ? "▲ 접기" : "▼ 펼치기"}</span>
              </div>
              {showLogMats && (
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  {logMaterials.map(mat => {
                    const alreadyInTracker = items.some(i => i.name.trim() === mat.name);
                    return (
                      <div key={mat.name} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 0", borderBottom:"1px solid #f7f8fa" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13, fontWeight:600, color:"#2d3748", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{mat.name}{mat.unit && <span style={{ fontWeight:400, color:"#a0aec0" }}> · {mat.unit}</span>}</div>
                          <div style={{ fontSize:11, color:"#a0aec0", marginTop:1 }}>총 {mat.totalQty > 0 ? `${mat.totalQty}${mat.unit}` : `${mat.uses.length}회`} 사용 · {fmtMoney(mat.totalCost)}</div>
                        </div>
                        {alreadyInTracker
                          ? <span style={{ fontSize:11, color:"#48BB78", fontWeight:700, flexShrink:0 }}>✓ 트래커 등록됨</span>
                          : <button onClick={()=>quickAddFromLog(mat)} style={{ background:"#FF6B35", color:"#fff", border:"none", borderRadius:6, padding:"3px 10px", fontSize:11, fontWeight:700, cursor:"pointer", flexShrink:0, whiteSpace:"nowrap" }}>+ 발주 추가</button>
                        }
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function ContactList() {
      const { siteId } = React.useContext(SiteContext);
      const [contacts, setContacts] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [adding, setAdding] = useState(false);
      const [form, setForm] = useState({ name:"", role:"", phone:"" });

      useEffect(() => { (async () => { setContacts(await fetchCollection("contacts", siteId)); setLoaded(true); })(); }, [siteId]);

      const addContact = async () => {
        if (!form.name.trim() || !form.phone.trim()) return;
        const id = newId("contact");
        const data = { siteId, name:form.name, role:form.role, phone:form.phone };
        setContacts(cs => [...cs, { id, ...data }]);
        setForm({ name:"", role:"", phone:"" });
        setAdding(false);
        await setDoc("contacts", id, data);
      };

      const removeContact = async (id) => {
        setContacts(cs => cs.filter(c => c.id !== id));
        await deleteDocFn("contacts", id);
      };

      if (!loaded) return null;

      return (
        <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>업체 · 인력 연락처</div>
            <button onClick={()=>setAdding(a=>!a)} style={{ background:"none", border:"none", color:"#FF6B35", fontSize:12, fontWeight:700, cursor:"pointer" }}>{adding?"닫기":"+ 추가"}</button>
          </div>
          {adding && (
            <div style={{ marginBottom:10, padding:10, background:"#f7f8fa", borderRadius:8 }}>
              <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="이름/업체명" style={{...dl.input, flex:1}} />
                <input value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} placeholder="구분 (전기/설비 등)" style={{...dl.input, flex:1}} />
              </div>
              <input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="연락처" style={{...dl.input, marginBottom:6}} />
              <button onClick={addContact} style={{ ...dl.primaryBtn, padding:"10px 0", fontSize:13 }}>추가</button>
            </div>
          )}
          {contacts.length === 0 ? (
            <div style={{ fontSize:12, color:"#a0aec0", textAlign:"center", padding:"10px 0" }}>등록된 연락처가 없습니다.</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {contacts.map(c => (
                <div key={c.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"1px solid #f0f0f3" }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>{c.name}{c.role && <span style={{ fontWeight:500, color:"#a0aec0" }}> · {c.role}</span>}</div>
                    <div style={{ fontSize:11, color:"#a0aec0", marginTop:2 }}>{c.phone}</div>
                  </div>
                  <a href={`tel:${c.phone}`} style={{ background:"#48BB78", color:"#fff", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, textDecoration:"none", flexShrink:0 }}>📞 전화</a>
                  <a href={`sms:${c.phone}`} style={{ background:"#4472C4", color:"#fff", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, textDecoration:"none", flexShrink:0 }}>💬 문자</a>
                  <button onClick={()=>removeContact(c.id)} className="x-remove-btn" style={dl.removeBtn}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function SettingsTab() {
      const { siteId, siteName, renameSite, deleteSite, switchSite } = React.useContext(SiteContext);
      const [loaded, setLoaded] = useState(false);
      const [form, setForm] = useState({ name:"", address:"", periodStart:"", periodEnd:"", client:"", notifyEnabled:true, budget:"", pin:"", lat:"", lon:"", anthropicApiKey:"" });
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [exporting, setExporting] = useState("");
      const importInputRef = useRef();

      useEffect(() => {
        (async () => {
          const s = await getSiteSettings(siteId);
          setForm(f => ({
            ...f, ...s,
            name: siteName || "",
            notifyEnabled: s.notifyEnabled !== false,
            budget: s.budget || "", pin: s.pin || "", lat: s.lat || "", lon: s.lon || "",
            anthropicApiKey: s.anthropicApiKey || "",
          }));
          setLoaded(true);
        })();
      }, [siteId, siteName]);

      const saveInfo = async () => {
        setSaving(true);
        if (form.name.trim() && form.name.trim() !== siteName) {
          await renameSite(siteId, form.name.trim());
        }
        await saveSiteSettings(siteId, {
          address: form.address, periodStart: form.periodStart, periodEnd: form.periodEnd,
          client: form.client, notifyEnabled: form.notifyEnabled, budget: form.budget,
          pin: form.pin.trim(), lat: form.lat, lon: form.lon,
          anthropicApiKey: form.anthropicApiKey.trim(),
        });
        setSaving(false);
        setSaved(true);
        setTimeout(() => setSaved(false), 1800);
      };

      // onlySheet: null(전체) | "일일작업일지" | "자재상세내역" | "장비상세내역" | "비용집계"
      const exportDailyLogXlsx = async (onlySheet) => {
        const expKey = onlySheet ? "sheet_" + onlySheet : "dailylog";
        setExporting(expKey);
        try {
          const logs = await fetchCollection("dailyLogs", siteId);
          const sorted = [...logs].sort((a,b) => a.date.localeCompare(b.date));
          if (sorted.length === 0) { notify("내보낼 작업일지가 없습니다."); return; }

          const DAYS = ["일","월","화","수","목","금","토"];
          const period = (form.periodStart && form.periodEnd)
            ? `${form.periodStart} ~ ${form.periodEnd}`
            : (form.periodStart || form.periodEnd || "");
          const getProcesses = (l) => (Array.isArray(l.processes) && l.processes.length ? l.processes : (l.process ? [l.process] : []));
          const include = (name) => !onlySheet || onlySheet === name;

          const wb = XLSX.utils.book_new();

          // ===== 시트1: 일일작업일지 =====
          if (include("일일작업일지")) {
          const ws1 = [
            [`인테리어 공사  일일 작업일지`],
            [`현장명`, siteName||"", "", "", "", `현장주소`, form.address||"", "", "", "", "", `공사기간`, period, "", "", "", `발주처`, form.client||"", "", "", ""],
            [`기본 정보`, "", "", "", `공정 및 인력`, "", "", "", "", "", `자재 투입 내역`, "", "", "", "", `장비 투입 내역`, "", `비용 집계`, "", "", "", "", `메모`],
            [`No.`, `날  짜`, `요  일`, `공  정`, `작업구역`, `작업내용`, `작업자(역할)`, `투입인원\n(명)`, `인건비\n(원)`, `자재명`, `규격/단위`, `수  량`, `단  가\n(원)`, `자재비\n합계(원)`, `투입장비`, `장비임대비\n(원)`, `인건비\n소계`, `자재비\n소계`, `장비비\n소계`, `기타비용\n(원)`, `일일\n총비용`, `누적\n총비용`, `특이사항`],
          ];
          let cumCost = 0;
          sorted.forEach((l, i) => {
            const d = new Date(l.date);
            const workers = l.workers || [];
            const materials = l.materials || [];
            const equipment = l.equipment || [];
            const laborCost = workers.reduce((s,w) => s+(Number(w.laborCost)||0), 0);
            const matCost = materials.reduce((s,m) => s+calcMaterialCost(m), 0);
            const eqCost = equipment.reduce((s,e) => s+(Number(e.cost)||0), 0);
            const otherCost = otherCostsTotal(l.otherCosts);
            const dailyTotal = Number(l.totalCost) || (laborCost+matCost+eqCost+otherCost);
            cumCost += dailyTotal;
            ws1.push([
              i+1, l.date, DAYS[d.getDay()], getProcesses(l).join("·"), l.area||"", l.content||"",
              workers.map(w=>w.role||"").filter(Boolean).join(" / "),
              workers.reduce((s,w)=>s+(Number(w.count)||0),0)||"",
              laborCost||0,
              materials.map(m=>m.name||"").filter(Boolean).join(", "),
              materials.map(m=>m.unit||"").filter(Boolean).join(", "),
              materials.reduce((s,m)=>s+(Number(m.qty)||0),0)||"",
              "", matCost||0,
              equipment.map(e=>e.name||"").filter(Boolean).join(", "),
              eqCost||0,
              laborCost||0, matCost||0, eqCost||0, otherCost||0,
              dailyTotal||0, cumCost,
              l.note||""
            ]);
          });
          const tL = sorted.reduce((s,l)=>(l.workers||[]).reduce((ss,w)=>ss+(Number(w.laborCost)||0),s),0);
          const tM = sorted.reduce((s,l)=>(l.materials||[]).reduce((ss,m)=>ss+calcMaterialCost(m),s),0);
          const tE = sorted.reduce((s,l)=>(l.equipment||[]).reduce((ss,e)=>ss+(Number(e.cost)||0),s),0);
          const tO = sorted.reduce((s,l)=>s+otherCostsTotal(l.otherCosts),0);
          const gT = tL+tM+tE+tO;
          ws1.push([`합  계`,"","","","","","","",tL,"","","","",tM,"",tE,tL,tM,tE,tO,gT,""]);
          const s1 = XLSX.utils.aoa_to_sheet(ws1);
          s1["!cols"] = [{wch:5},{wch:13},{wch:5},{wch:18},{wch:14},{wch:40},{wch:20},{wch:8},{wch:13},{wch:22},{wch:10},{wch:7},{wch:13},{wch:14},{wch:20},{wch:14},{wch:13},{wch:13},{wch:13},{wch:13},{wch:13},{wch:14},{wch:22}];
          XLSX.utils.book_append_sheet(wb, s1, "일일작업일지");
          } // end include 일일작업일지

          // ===== 시트2: 자재상세내역 =====
          if (include("자재상세내역")) {
          const ws2 = [
            [`자재 투입 상세 내역`],
            [`No.`, `날짜`, `공정`, `자재명`, `규격`, `단위`, `수량`, `단가(원)`, `금액(원)`, `비고`],
          ];
          let mn = 1;
          sorted.forEach(l => {
            (l.materials||[]).forEach(m => {
              if (!m.name && !calcMaterialCost(m)) return;
              ws2.push([mn++, l.date, getProcesses(l).join("·"), m.name||"", "", m.unit||"", Number(m.qty)||0, Number(m.unitPrice)||0, calcMaterialCost(m), ""]);
            });
          });
          ws2.push([`합  계`,"","","","","","","", ws2.slice(2).reduce((s,r)=>s+(Number(r[8])||0),0), ""]);
          const s2 = XLSX.utils.aoa_to_sheet(ws2);
          s2["!cols"] = [{wch:6},{wch:13},{wch:18},{wch:22},{wch:12},{wch:8},{wch:8},{wch:13},{wch:14},{wch:20}];
          XLSX.utils.book_append_sheet(wb, s2, "자재상세내역");
          } // end include 자재상세내역

          // ===== 시트3: 장비상세내역 =====
          if (include("장비상세내역")) {
          const ws3 = [
            [`장비 투입 상세 내역`],
            [`No.`, `날짜`, `공정`, `장비명`, `수량`, `임대비(원)`, `비고`],
          ];
          let en = 1;
          sorted.forEach(l => {
            (l.equipment||[]).forEach(e => {
              if (!e.name && !(Number(e.cost))) return;
              ws3.push([en++, l.date, getProcesses(l).join("·"), e.name||"", 1, Number(e.cost)||0, ""]);
            });
          });
          ws3.push([`합  계`,"","","","", ws3.slice(2).reduce((s,r)=>s+(Number(r[5])||0),0), ""]);
          const s3 = XLSX.utils.aoa_to_sheet(ws3);
          s3["!cols"] = [{wch:6},{wch:13},{wch:18},{wch:22},{wch:8},{wch:14},{wch:20}];
          XLSX.utils.book_append_sheet(wb, s3, "장비상세내역");
          } // end include 장비상세내역

          // ===== 시트4: 비용집계 =====
          if (include("비용집계")) {
          const ws4 = [
            [`공사 비용 집계표`],
            [`▶  공사비 예산 대비 실적`],
            [`구분`, `예산(원)`, `실적(원)`, `잔액(원)`, `집행률(%)`, `비고`],
            [`인건비`, "", tL, "", 0, ""],
            [`자재비`, "", tM, "", 0, ""],
            [`장비비`, "", tE, "", 0, ""],
            [`기타경비`, "", tO, "", 0, ""],
            [`합  계`, 0, gT, "", "", ""],
            [`VAT (10%)`, 0, Math.round(gT*0.1), "", "", ""],
            [`합계 (VAT 포함)`, 0, gT+Math.round(gT*0.1), "", "", ""],
            [`▶  월별 비용 집계`],
            [`월`, `인건비(원)`, `자재비(원)`, `장비비(원)`, `기타(원)`, `합계(원)`, `비고`],
          ];
          const monthly = {};
          sorted.forEach(l => {
            const mo = l.date.slice(0,7);
            if (!monthly[mo]) monthly[mo] = {l:0,m:0,e:0,o:0};
            monthly[mo].l += (l.workers||[]).reduce((s,w)=>s+(Number(w.laborCost)||0),0);
            monthly[mo].m += (l.materials||[]).reduce((s,m2)=>s+calcMaterialCost(m2),0);
            monthly[mo].e += (l.equipment||[]).reduce((s,e)=>s+(Number(e.cost)||0),0);
            monthly[mo].o += otherCostsTotal(l.otherCosts);
          });
          Object.keys(monthly).sort().forEach(mo => {
            const v = monthly[mo];
            ws4.push([`${mo.slice(0,4)}년 ${mo.slice(5,7)}월`, v.l, v.m, v.e, v.o, v.l+v.m+v.e+v.o, ""]);
          });
          const s4 = XLSX.utils.aoa_to_sheet(ws4);
          s4["!cols"] = [{wch:18},{wch:14},{wch:14},{wch:14},{wch:12},{wch:14},{wch:20}];
          XLSX.utils.book_append_sheet(wb, s4, "비용집계");
          } // end include 비용집계

          const suffix = onlySheet || "전체";
          XLSX.writeFile(wb, `${siteName}_작업일지_${suffix}_${today}.xlsx`);
        } catch(e) {
          console.warn("export err", e);
          notify("내보내기 중 오류가 발생했습니다.");
        } finally { setExporting(""); }
      };

      const exportScheduleXlsx = async () => {
        setExporting("schedule");
        try {
          const tasks = await fetchCollection("schedule", siteId);
          const rows = [...tasks].sort((a,b) => a.startDate.localeCompare(b.startDate)).map(t => ({
            공종: t.name, 시작일: t.startDate, 종료일: t.endDate, 상태: STATUS_LABEL[t.status]||t.status, 비고: t.note||"",
          }));
          const ws = XLSX.utils.json_to_sheet(rows);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "공정표");
          XLSX.writeFile(wb, `${siteName}_공정표_${today}.xlsx`);
        } finally { setExporting(""); }
      };

      const exportCostXlsx = async () => {
        setExporting("cost");
        try {
          const logs = await fetchCollection("dailyLogs", siteId);
          const map = {};
          logs.forEach(l => {
            const key = l.process || "기타";
            if (!map[key]) map[key] = { 공종:key, 인건비:0, 자재비:0, 장비비:0, 기타비용:0, 합계:0 };
            const labor = (l.workers||[]).reduce((s,w)=>s+(Number(w.laborCost)||0),0);
            const material = (l.materials||[]).reduce((s,m)=>s+calcMaterialCost(m),0);
            const equipment = (l.equipment||[]).reduce((s,e)=>s+(Number(e.cost)||0),0);
            const other = otherCostsTotal(l.otherCosts);
            map[key].인건비 += labor; map[key].자재비 += material; map[key].장비비 += equipment; map[key].기타비용 += other;
            map[key].합계 += labor+material+equipment+other;
          });
          const rows = Object.values(map);
          const grandTotal = rows.reduce((s,r)=>s+r.합계,0);
          rows.push({
            공종:"총합계",
            인건비: rows.reduce((s,r)=>s+r.인건비,0),
            자재비: rows.reduce((s,r)=>s+r.자재비,0),
            장비비: rows.reduce((s,r)=>s+r.장비비,0),
            기타비용: rows.reduce((s,r)=>s+r.기타비용,0),
            합계: grandTotal,
          });
          const vat = Math.round(grandTotal * 0.1);
          rows.push({ 공종:"부가세(VAT 10%)", 인건비:"", 자재비:"", 장비비:"", 기타비용:"", 합계: vat });
          rows.push({ 공종:"총합계(VAT포함)", 인건비:"", 자재비:"", 장비비:"", 기타비용:"", 합계: grandTotal + vat });
          const ws = XLSX.utils.json_to_sheet(rows);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "비용정산서");
          XLSX.writeFile(wb, `${siteName}_비용정산서_${today}.xlsx`);
        } finally { setExporting(""); }
      };

      const exportBackupJson = async () => {
        setExporting("backup");
        try {
          const [dailyLogs, schedule, materials, contacts, siteSettings, cloud] = await Promise.all([
            fetchCollection("dailyLogs", siteId), fetchCollection("schedule", siteId), fetchCollection("materials", siteId),
            fetchCollection("contacts", siteId), getSiteSettings(siteId), cloudLoad(),
          ]);
          const checklist = {};
          Object.keys(cloud?.logs || {}).forEach(k => { if (k.startsWith(siteId + "_")) checklist[k] = cloud.logs[k]; });
          const backup = { exportedAt: new Date().toISOString(), siteId, siteName, dailyLogs, schedule, materials, contacts, siteSettings, checklist };
          const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `${siteName}_백업_${today}.json`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } finally { setExporting(""); }
      };

      const importBackupJson = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setExporting("import");
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const ok = window.confirm(
            `백업 파일(${data.siteName || "알 수 없음"}, ${data.exportedAt ? data.exportedAt.slice(0,10) : ""})을 ` +
            `현재 현장(${siteName})으로 가져옵니다. 기존 데이터와 병합됩니다. 계속할까요?`
          );
          if (!ok) return;
          for (const l of (data.dailyLogs||[])) await setDoc("dailyLogs", l.id, { ...l, siteId });
          for (const t of (data.schedule||[])) await setDoc("schedule", t.id, { ...t, siteId });
          for (const m of (data.materials||[])) await setDoc("materials", m.id, { ...m, siteId });
          for (const c of (data.contacts||[])) await setDoc("contacts", c.id, { ...c, siteId });
          if (data.siteSettings) await saveSiteSettings(siteId, data.siteSettings);
          if (data.checklist) {
            const cloud = await cloudLoad();
            const remapped = {};
            Object.keys(data.checklist).forEach(k => {
              const day = k.slice(k.indexOf("_")+1);
              remapped[`${siteId}_${day}`] = data.checklist[k];
            });
            await cloudSave(cloud?.sites || [], { ...(cloud?.logs||{}), ...remapped });
          }
          notify("백업 데이터를 가져왔습니다. 새로고침 후 확인해주세요.", "success");
        } catch (err) {
          console.warn("import err", err);
          notify("백업 파일을 읽는 중 오류가 발생했습니다. 파일 형식을 확인해주세요.");
        } finally {
          setExporting("");
          e.target.value = "";
        }
      };

      if (!loaded) return <div style={{ padding:32, color:"#a0aec0", textAlign:"center" }}>불러오는 중...</div>;

      return (

    function CleanupSection() {
      const { siteId } = React.useContext(SiteContext);
      const [cutoff, setCutoff] = useState(() => {
        const d = new Date(); d.setMonth(d.getMonth()-3);
        return fmtDate(d);
      });
      const [busy, setBusy] = useState(false);
      const [status, setStatus] = useState("");

      const run = async () => {
        setBusy(true);
        setStatus("");
        try {
          const logs = await fetchCollection("dailyLogs", siteId);
          const targets = logs.filter(l => l.date < cutoff);
          if (targets.length === 0) {
            setStatus("해당 기간에 정리할 작업일지가 없습니다.");
            setBusy(false);
            return;
          }

          // 1) 백업 파일 먼저 다운로드 (xlsx + json, 사진 URL 포함)
          const rows = targets.map(l => ({
            날짜: l.date, 공정: l.process, 위치: l.area||"", 내용: l.content||"",
            인건비: (l.workers||[]).reduce((s,w)=>s+(Number(w.laborCost)||0),0),
            자재비: (l.materials||[]).reduce((s,m)=>s+calcMaterialCost(m),0),
            장비비: (l.equipment||[]).reduce((s,e)=>s+(Number(e.cost)||0),0),
            기타비용: otherCostsTotal(l.otherCosts),
            합계: Number(l.totalCost)||0,
            비고: l.note||"",
            사진: (l.photos||[]).join(", "),
          }));
          const ws = XLSX.utils.json_to_sheet(rows);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "백업");
          XLSX.writeFile(wb, `작업일지_백업_${cutoff}이전_${today}.xlsx`);

          const blob = new Blob([JSON.stringify(targets, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `작업일지_백업_${cutoff}이전_${today}.json`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);

          // 2) 사용자 확인
          const photoCount = targets.reduce((s,l) => s + (l.photos?.length||0), 0);
          const ok = window.confirm(
            `${cutoff} 이전 작업일지 ${targets.length}건(사진 ${photoCount}장 포함)을 백업 파일로 내보냈습니다.\n` +
            `다운로드된 파일을 확인하셨다면 삭제를 진행할까요?\n이 작업은 되돌릴 수 없습니다.`
          );
          if (!ok) {
            setStatus("삭제를 취소했습니다. 백업 파일은 다운로드되었습니다.");
            setBusy(false);
            return;
          }

          // 3) Firestore + Storage 삭제
          for (const l of targets) {
            for (const photoUrl of (l.photos||[])) await deletePhoto(photoUrl);
            await deleteDocFn("dailyLogs", l.id);
          }
          setStatus(`✓ 작업일지 ${targets.length}건과 사진 ${photoCount}장을 삭제했습니다.`);
        } catch (e) {
          console.warn("cleanup err", e);
          setStatus("처리 중 오류가 발생했습니다.");
        } finally {
          setBusy(false);
        }
      };

      return (
        <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:4 }}>오래된 작업일지 정리</div>
          <div style={{ fontSize:11, color:"#a0aec0", marginBottom:10 }}>
            선택한 날짜 이전의 작업일지를 백업(.xlsx + .json) 파일로 먼저 내보낸 뒤, 확인하면 Firestore와 사진(Storage)에서 삭제합니다. 저장 공간이 부족할 때 사용하세요.
          </div>
          <div style={{ display:"flex", gap:6, marginBottom:8, alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#4a5568", flexShrink:0 }}>이 날짜 이전:</span>
            <input type="date" value={cutoff} onChange={e=>setCutoff(e.target.value)} style={{...dl.input, flex:1}} />
          </div>
          <button onClick={run} disabled={busy} style={{ ...dl.secondaryBtn, borderColor:"#feb2b2", color:"#e53e3e" }}>
            {busy ? "처리 중..." : "🗑 백업 후 삭제"}
          </button>
          {status && <div style={{ fontSize:11, color:"#718096", marginTop:8 }}>{status}</div>}
        </div>
      );
    }

    const TABS = [
