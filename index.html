<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="현장일지" />
  <title>현장 체크리스트</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAF4oLS8by7d5O4ran-qiBy4JRF2ydL7qk",
      authDomain: "site-checklist-c79b3.firebaseapp.com",
      projectId: "site-checklist-c79b3",
      storageBucket: "site-checklist-c79b3.firebasestorage.app",
      messagingSenderId: "294420287921",
      appId: "1:294420287921:web:62ffe0b262091cb656ad90"
    });
    const db = firebase.firestore();
    async function cloudSave(sites, logs) {
      try { await db.collection("data").doc("main").set({ sites: JSON.stringify(sites), logs: JSON.stringify(logs) }); } catch(e) { console.warn("save err", e); }
    }
    async function cloudLoad() {
      try {
        const snap = await db.collection("data").doc("main").get();
        if (snap.exists) return { sites: JSON.parse(snap.data().sites||"[]"), logs: JSON.parse(snap.data().logs||"{}") };
      } catch(e) { console.warn("load err", e); }
      return null;
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    input, button, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CATS = [
      { key: "required", label: "필수사항", color: "#e53e3e", bg: "#fff5f5", border: "#feb2b2" },
      { key: "request",  label: "요청사항", color: "#2b6cb0", bg: "#ebf8ff", border: "#90cdf4" },
      { key: "change",   label: "변동사항", color: "#276749", bg: "#f0fff4", border: "#9ae6b4" },
    ];

    const fmtDate = (d) => {
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), dd = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${dd}`;
    };
    const today = fmtDate(new Date());
    const dayLabel = (s) => {
      const days = ["일","월","화","수","목","금","토"];
      const d = new Date(s);
      return `${s.slice(5).replace("-","/")} (${days[d.getDay()]})`;
    };
    function lsLoad(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } }
    function lsSave(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

    function ItemRow({ item, cat, onToggle, onDelete, onEdit }) {
      const [editing, setEditing] = useState(false);
      const [editVal, setEditVal] = useState(item.text);
      const save = () => { if (editVal.trim()) onEdit(item.id, editVal.trim()); setEditing(false); };
      return (
        <div style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"7px 10px", borderRadius:7, border:`1.5px solid ${item.done?"#e2e8f0":cat.border}`, background:item.done?"#f7fafc":cat.bg, marginBottom:5 }}>
          <button onClick={() => onToggle(item.id)} style={{ width:18, height:18, borderRadius:4, border:`2px solid ${item.done?"#aaa":cat.color}`, background:item.done?"#aaa":"transparent", cursor:"pointer", flexShrink:0, marginTop:2, display:"flex", alignItems:"center", justifyContent:"center" }}>
            {item.done && <span style={{ color:"#fff", fontSize:11, fontWeight:700 }}>✓</span>}
          </button>
          {editing ? (
            <>
              <input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") save(); if(e.key==="Escape") setEditing(false); }} autoFocus style={{ flex:1, fontSize:13, border:"1.5px solid "+cat.border, borderRadius:5, padding:"2px 6px", outline:"none" }} />
              <button onClick={save} style={{ background:"none", border:"none", cursor:"pointer", color:cat.color, fontSize:13, fontWeight:700, padding:"0 2px" }}>저장</button>
              <button onClick={()=>setEditing(false)} style={{ background:"none", border:"none", cursor:"pointer", color:"#a0aec0", fontSize:13, padding:"0 2px" }}>취소</button>
            </>
          ) : (
            <>
              <span style={{ flex:1, fontSize:13, color:item.done?"#a0aec0":"#2d3748", textDecoration:item.done?"line-through":"none", lineHeight:1.5 }}>{item.text}</span>
              <span style={{ fontSize:11, color:"#a0aec0", flexShrink:0 }}>{item.createdAt}</span>
              <button onClick={()=>{ setEditVal(item.text); setEditing(true); }} style={{ background:"none", border:"none", cursor:"pointer", color:"#a0aec0", fontSize:13, padding:"0 2px", flexShrink:0 }}>✏️</button>
              <button onClick={() => onDelete(item.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"#a0aec0", fontSize:15, padding:"0 2px", flexShrink:0 }}>×</button>
            </>
          )}
        </div>
      );
    }

    function HistoryDay({ d, logs, logKey, onGoDay, onToggle, onDelete, onEdit }) {
      const [open, setOpen] = useState(true);
      const dayData = logs[logKey] || {};
      const total = CATS.reduce((s,c) => s + (dayData[c.key]||[]).length, 0);
      const done  = CATS.reduce((s,c) => s + (dayData[c.key]||[]).filter(i=>i.done).length, 0);
      return (
        <div style={{ marginBottom:10, borderRadius:10, border:"1.5px solid #e2e8f0", overflow:"hidden", background:"#fff" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", cursor:"pointer", background:"#f7fafc" }} onClick={() => setOpen(o=>!o)}>
            <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <span style={{ fontSize:14, fontWeight:500 }}>{dayLabel(d)}</span>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {CATS.map(c => { const cnt=(dayData[c.key]||[]).length; if(!cnt) return null;
                  return <span key={c.key} style={{ fontSize:11, padding:"2px 7px", borderRadius:10, background:c.bg, color:c.color, border:`1px solid ${c.border}`, fontWeight:500 }}>{c.label} {cnt}</span>;
                })}
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:12, color: done===total&&total>0?"#276749":"#a0aec0" }}>{done}/{total}</span>
              <span style={{ fontSize:12, color:"#a0aec0", display:"inline-block", transform: open?"rotate(90deg)":"rotate(0deg)", transition:"transform 0.15s" }}>›</span>
            </div>
          </div>
          {open && (
            <div style={{ padding:"10px 14px" }}>
              {CATS.map(cat => {
                const items = dayData[cat.key] || [];
                if (!items.length) return null;
                return (
                  <div key={cat.key} style={{ marginBottom:10 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                      <div style={{ width:3, height:14, borderRadius:2, background:cat.color }} />
                      <span style={{ fontSize:13, fontWeight:500, color:cat.color }}>{cat.label}</span>
                    </div>
                    {items.map(item => (
                      <ItemRow key={item.id} item={item} cat={cat}
                        onToggle={(id) => onToggle(logKey, cat.key, id)}
                        onDelete={(id) => onDelete(logKey, cat.key, id)}
                        onEdit={(id, text) => onEdit(logKey, cat.key, id, text)} />
                    ))}
                  </div>
                );
              })}
              <button onClick={onGoDay} style={{ fontSize:12, color:"#718096", background:"none", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 10px", cursor:"pointer", marginTop:2 }}>이 날짜로 이동 →</button>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [sites, setSites]     = useState([]);
      const [curSite, setCurSite] = useState(null);
      const [curDate, setCurDate] = useState(today);
      const [logs, setLogs]       = useState({});
      const [view, setView]       = useState("history");
      const [newSiteName, setNewSiteName] = useState("");
      const [addingSite, setAddingSite]   = useState(false);
      const [inputs, setInputs]   = useState({ required:"", request:"", change:"" });
      const [syncing, setSyncing] = useState(false);
      const [lastSync, setLastSync] = useState(null);
      const [loaded, setLoaded]   = useState(false);
      const inputRefs = { required: useRef(), request: useRef(), change: useRef() };
      const syncTimer = useRef(null);

      useEffect(() => {
        (async () => {
          const cloud = await cloudLoad();
          if (cloud && cloud.sites.length > 0) {
            setSites(cloud.sites);
            setLogs(cloud.logs);
            setCurSite(cloud.sites[0].id);
            lsSave("sites", cloud.sites);
            lsSave("logs", cloud.logs);
          } else {
            const ls = lsLoad("sites") || [];
            const ll = lsLoad("logs") || {};
            setSites(ls);
            setLogs(ll);
            if (ls.length) setCurSite(ls[0].id);
          }
          setLoaded(true);
        })();
      }, []);

      const sync = (newSites, newLogs) => {
        lsSave("sites", newSites);
        lsSave("logs", newLogs);
        clearTimeout(syncTimer.current);
        setSyncing(true);
        syncTimer.current = setTimeout(async () => {
          await cloudSave(newSites, newLogs);
          setSyncing(false);
          setLastSync(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
        }, 800);
      };

      const addSite = () => {
        const name = newSiteName.trim(); if (!name) return;
        const id = "site_" + Date.now();
        const ns = [...sites, { id, name, createdAt: today }];
        setSites(ns); setCurSite(id); setNewSiteName(""); setAddingSite(false);
        sync(ns, logs);
      };
      const deleteSite = (id) => {
        if (!confirm("현장을 삭제하면 모든 일지가 사라집니다. 삭제할까요?")) return;
        const ns = sites.filter(s => s.id !== id);
        const nl = {...logs}; Object.keys(nl).forEach(k => { if(k.startsWith(id+"_")) delete nl[k]; });
        setSites(ns); setLogs(nl); setCurSite(ns.length ? ns[0].id : null);
        sync(ns, nl);
      };

      const logKey = curSite ? `${curSite}_${curDate}` : null;
      const dayLog = logKey ? (logs[logKey] || { required:[], request:[], change:[] }) : null;

      const addItem = (cat) => {
        const text = inputs[cat].trim(); if (!text || !logKey) return;
        const item = { id: Date.now(), text, done: false, createdAt: new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}) };
        const nl = { ...logs, [logKey]: { ...dayLog, [cat]: [...(dayLog[cat]||[]), item] } };
        setLogs(nl); sync(sites, nl);
        setInputs(p => ({ ...p, [cat]:"" }));
        inputRefs[cat]?.current?.focus();
      };
      const toggleItem = (key, cat, id) => {
        const nl = { ...logs, [key]: { ...(logs[key]||{}), [cat]: (logs[key]?.[cat]||[]).map(i => i.id===id?{...i,done:!i.done}:i) } };
        setLogs(nl); sync(sites, nl);
      };
      const editItem = (key, cat, id, text) => {
        const nl = { ...logs, [key]: { ...(logs[key]||{}), [cat]: (logs[key]?.[cat]||[]).map(i => i.id===id?{...i,text}:i) } };
        setLogs(nl); sync(sites, nl);
      };
        const nl = { ...logs, [key]: { ...(logs[key]||{}), [cat]: (logs[key]?.[cat]||[]).filter(i => i.id!==id) } };
        setLogs(nl); sync(sites, nl);
      };

      const siteDates = curSite
        ? [...new Set(Object.keys(logs).filter(k=>k.startsWith(curSite+"_")).map(k=>k.replace(curSite+"_","")).filter(d=>CATS.some(c=>(logs[curSite+"_"+d]?.[c.key]||[]).length>0)))].sort((a,b)=>b.localeCompare(a))
        : [];

      if (!loaded) return <div style={{ padding:32, color:"#a0aec0", textAlign:"center" }}>불러오는 중...</div>;

      return (
        <div style={{ fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", maxWidth:680, margin:"0 auto", padding:"16px 12px", minHeight:"100vh" }}>

          {/* 동기화 상태 */}
          <div style={{ textAlign:"right", fontSize:11, color:"#a0aec0", marginBottom:8 }}>
            {syncing ? "⏳ 저장 중..." : lastSync ? `✅ ${lastSync} 동기화됨` : ""}
          </div>

          {/* 현장 탭 */}
          <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", marginBottom:16 }}>
            {sites.map(s => (
              <div key={s.id} style={{ display:"flex", alignItems:"center", borderRadius:20, overflow:"hidden", border: curSite===s.id?"2px solid #4a5568":"1.5px solid #e2e8f0", background: curSite===s.id?"#edf2f7":"transparent" }}>
                <button onClick={() => { setCurSite(s.id); setView("history"); }} style={{ padding:"6px 14px", fontSize:13, fontWeight:curSite===s.id?500:400, background:"none", border:"none", cursor:"pointer", color:"#2d3748" }}>{s.name}</button>
                <button onClick={() => deleteSite(s.id)} style={{ padding:"4px 8px 4px 0", background:"none", border:"none", cursor:"pointer", color:"#a0aec0", fontSize:13 }}>×</button>
              </div>
            ))}
            {addingSite ? (
              <div style={{ display:"flex", gap:4 }}>
                <input value={newSiteName} onChange={e=>setNewSiteName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSite()} placeholder="현장명 입력" style={{ padding:"5px 10px", fontSize:13, borderRadius:20, border:"1.5px solid #cbd5e0", outline:"none", width:120 }} autoFocus />
                <button onClick={addSite} style={{ padding:"5px 12px", fontSize:12, borderRadius:20, background:"#2d3748", color:"#fff", border:"none", cursor:"pointer" }}>추가</button>
                <button onClick={()=>setAddingSite(false)} style={{ padding:"5px 10px", fontSize:12, borderRadius:20, background:"none", border:"1.5px solid #e2e8f0", cursor:"pointer", color:"#718096" }}>취소</button>
              </div>
            ) : (
              <button onClick={()=>setAddingSite(true)} style={{ padding:"6px 14px", fontSize:13, borderRadius:20, border:"1.5px dashed #cbd5e0", background:"none", cursor:"pointer", color:"#a0aec0" }}>+ 현장 추가</button>
            )}
          </div>

          {!curSite ? (
            <div style={{ textAlign:"center", padding:"60px 0", color:"#a0aec0", fontSize:14 }}>현장을 추가해주세요</div>
          ) : (
            <>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, gap:8, flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <button onClick={()=>{ const d=new Date(curDate); d.setDate(d.getDate()-1); setCurDate(fmtDate(d)); setView("day"); }} style={navBtn}>‹</button>
                  <input type="date" value={curDate} onChange={e=>{setCurDate(e.target.value);setView("day");}} style={{ fontSize:14, fontWeight:500, background:"none", border:"none", outline:"none", cursor:"pointer", color:"#2d3748" }} />
                  <span style={{ fontSize:13, color:"#a0aec0" }}>({["일","월","화","수","목","금","토"][new Date(curDate).getDay()]})</span>
                  <button onClick={()=>{ const d=new Date(curDate); d.setDate(d.getDate()+1); setCurDate(fmtDate(d)); setView("day"); }} style={navBtn}>›</button>
                </div>
                <div style={{ display:"flex", gap:4 }}>
                  <button onClick={()=>setView("day")} style={{ ...viewBtn, fontWeight:view==="day"?500:400, borderColor:view==="day"?"#4a5568":"#e2e8f0", background:view==="day"?"#edf2f7":"none" }}>날짜별 입력</button>
                  <button onClick={()=>setView("history")} style={{ ...viewBtn, fontWeight:view==="history"?500:400, borderColor:view==="history"?"#4a5568":"#e2e8f0", background:view==="history"?"#edf2f7":"none" }}>전체 이력</button>
                </div>
              </div>

              {view==="history" ? (
                <div>
                  {siteDates.length===0
                    ? <div style={{ color:"#a0aec0", fontSize:14, padding:"40px 0", textAlign:"center" }}>아직 기록이 없습니다</div>
                    : siteDates.map(d => (
                        <HistoryDay key={d} d={d} logs={logs} logKey={`${curSite}_${d}`}
                          onGoDay={()=>{ setCurDate(d); setView("day"); }}
                          onToggle={toggleItem} onDelete={deleteItem} onEdit={editItem} />
                      ))
                  }
                </div>
              ) : (
                CATS.map(cat => {
                  const items = dayLog?.[cat.key] || [];
                  return (
                    <div key={cat.key} style={{ marginBottom:20 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <div style={{ width:4, height:18, borderRadius:2, background:cat.color }} />
                        <span style={{ fontSize:15, fontWeight:500, color:cat.color }}>{cat.label}</span>
                        <span style={{ fontSize:12, color:"#a0aec0" }}>{items.filter(i=>i.done).length}/{items.length}</span>
                      </div>
                      {items.length===0 && <div style={{ fontSize:13, color:"#a0aec0", padding:"8px 0 4px 12px" }}>항목 없음</div>}
                      {items.map(item => (
                        <ItemRow key={item.id} item={item} cat={cat}
                          onToggle={(id) => toggleItem(logKey, cat.key, id)}
                          onDelete={(id) => deleteItem(logKey, cat.key, id)}
                          onEdit={(id, text) => editItem(logKey, cat.key, id, text)} />
                      ))}
                      <div style={{ display:"flex", gap:6, marginTop:6 }}>
                        <input ref={inputRefs[cat.key]} value={inputs[cat.key]} onChange={e=>setInputs(p=>({...p,[cat.key]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem(cat.key)} placeholder={`${cat.label} 항목 추가...`} style={{ flex:1, padding:"8px 12px", fontSize:13, borderRadius:8, border:"1.5px solid #e2e8f0", outline:"none" }} />
                        <button onClick={()=>addItem(cat.key)} style={{ padding:"8px 16px", fontSize:13, borderRadius:8, background:cat.color, color:"#fff", border:"none", cursor:"pointer", fontWeight:500 }}>추가</button>
                      </div>
                    </div>
                  );
                })
              )}
            </>
          )}
        </div>
      );
    }

    const navBtn = { background:"none", border:"1.5px solid #e2e8f0", borderRadius:6, width:28, height:28, cursor:"pointer", color:"#718096", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" };
    const viewBtn = { padding:"5px 12px", fontSize:12, borderRadius:20, border:"1.5px solid", cursor:"pointer", color:"#2d3748" };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
