    });
    const db = firebase.firestore();
    const storage = firebase.storage();

    // 오프라인 persistence: 오프라인 상태에서 입력한 내용을 로컬에 큐잉해두고
    // 재연결되면 자동으로 Firestore와 동기화한다.
    db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
      if (err.code === "failed-precondition") {
        console.warn("Firestore persistence: 여러 탭이 열려 있어 한 탭에서만 활성화됩니다.");
      } else if (err.code === "unimplemented") {
        console.warn("Firestore persistence: 이 브라우저는 오프라인 저장을 지원하지 않습니다.");
      } else {
        console.warn("Firestore persistence 활성화 실패", err);
      }

    // ---- 사진 업로드 (Firebase Storage) ----
    async function uploadPhoto(file, pathPrefix) {
      const ext = (file.name && file.name.includes(".")) ? file.name.split(".").pop() : "jpg";
      const path = `${pathPrefix}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
      const ref = storage.ref().child(path);
      await ref.put(file);
      return await ref.getDownloadURL();
    }
    async function deletePhoto(url) {
      try { await storage.refFromURL(url).delete(); } catch(e) { console.warn("photo delete err", e); }
    }

    // ---- 체크리스트(기존) 데이터: data/main 문서 ----
    async function cloudSave(sites, logs) {
      try { await db.collection("data").doc("main").set({ sites: JSON.stringify(sites), logs: JSON.stringify(logs) }); } catch(e) { console.warn("save err", e); }
    }
    async function cloudLoad() {
      try {
        const snap = await db.collection("data").doc("main").get();
        if (snap.exists) return { sites: JSON.parse(snap.data().sites||"[]"), logs: JSON.parse(snap.data().logs||"{}") };
      } catch(e) { console.warn("load err", e); }
      return null;
    }

    // ---- 전역 토스트 알림 (React 쪽 ToastHost가 구독) ----
    let _notify = (msg) => console.warn("[notify]", msg);
    function notify(msg, type) { _notify(msg, type); }

    // ---- 새 컬렉션 공용 헬퍼 (공정표/작업일지/비용/설정에서 사용) — siteId로 스코핑 ----
    async function fetchCollection(name, siteId) {
      try {
        let q = db.collection(name);
        if (siteId) q = q.where("siteId", "==", siteId);
        const snap = await q.get();
        // 주의: 시드 데이터의 data.id 필드가 실제 문서 ID를 덮어쓰지 않도록 spread 순서를 맞춤
        // (이전엔 data.id가 실제 Firestore 문서ID를 가려서 삭제가 다른 문서를 가리켜 "삭제해도 되살아나는" 문제가 있었음)
        return snap.docs.map(d => ({ ...d.data(), id: d.id }));
      } catch(e) {
        console.warn("fetch "+name+" err", e);
        notify("데이터를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.");
        return [];
      }
    }
    async function setDoc(collectionName, id, data) {
      try { await db.collection(collectionName).doc(id).set(data, { merge: true }); return true; }
      catch(e) { console.warn("setDoc err", e); notify("저장에 실패했습니다. 인터넷 연결을 확인해주세요."); return false; }
    }
    async function deleteDocFn(collectionName, id) {
      try { await db.collection(collectionName).doc(id).delete(); return true; }
      catch(e) { console.warn("deleteDoc err", e); notify("삭제에 실패했습니다. 인터넷 연결을 확인해주세요."); return false; }
    }

    // ---- 현장별 설정 (siteSettings/{siteId}) : 주소/기간/발주처/예산/알림/PIN/날씨위치 ----
    async function getSiteSettings(siteId) {
      try {
        const snap = await db.collection("siteSettings").doc(siteId).get();
        return snap.exists ? snap.data() : {};
      } catch(e) { console.warn("siteSettings err", e); return {}; }
    }
    async function saveSiteSettings(siteId, patch) {
      return setDoc("siteSettings", siteId, patch);
    }

    // ---- AI 작업일지 자동분류 (Anthropic API) ----
    async function parseDailyLogWithAI(text, apiKey) {
      const system = `당신은 건설/인테리어 현장 작업일지 정리 도우미입니다. 작업자가 자유롭게 쓴 오늘의 작업 내용을 분석해서 아래 JSON 형식으로만 응답하세요. 다른 설명, 코드블록 없이 JSON 객체만 출력합니다.

{
  "process": "공정명. 다음 목록 중 가장 가까운 것을 우선 선택하고, 적절한 것이 없으면 새로 간결하게 작성: ${PROCESS_LIST.join(", ")}",
  "area": "작업 구역/위치 (예: 욕실, 거실, 전체)",
  "content": "작업 내용을 1. 2. 3. 번호 목록 형태의 줄글로 정리",
  "workers": [{"role":"역할 또는 팀명","count":인원수(숫자),"laborCost":인건비 합계 원 단위(숫자, 언급 없으면 0)}],
  "materials": [{"name":"자재명","unit":"단위","qty":수량(숫자),"unitPrice":단가 원 단위(숫자)}],
  "equipment": [{"name":"장비명","cost":임대비 원 단위(숫자)}],
  "otherCosts": {"meal":식대 원 단위(숫자), "delivery":운반비 원 단위(숫자), "etc":기타비용 원 단위(숫자)},
  "note": "특이사항이나 다음 작업 인계사항 (없으면 빈 문자열)"
}

언급되지 않은 항목은 빈 배열([]) 또는 0으로 둡니다. 금액·수량 정보가 없으면 0으로 둡니다.`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1500,
          system,
          messages: [{ role: "user", content: text }],
        }),
      });
      if (!res.ok) {
        const errText = await res.text().catch(()=>"");
        throw new Error(`API 오류 (${res.status}): ${errText.slice(0,200)}`);
      }
      const data = await res.json();
      const raw = data?.content?.[0]?.text || "";
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("응답을 해석할 수 없습니다.");
      return JSON.parse(jsonMatch[0]);
    }

    // ---- 이미지 압축 (업로드 전 리사이즈, 용량 절약) ----
    function compressImage(file, maxDim, quality) {
      maxDim = maxDim || 1600; quality = quality || 0.75;
      return new Promise((resolve) => {
        if (!file.type || !file.type.startsWith("image/")) { resolve(file); return; }
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => {
            URL.revokeObjectURL(url);
            if (!blob) { resolve(file); return; }
            const name = (file.name || "photo.jpg").replace(/\.\w+$/, ".jpg");
            resolve(new File([blob], name, { type: "image/jpeg" }));
          }, "image/jpeg", quality);
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
        img.src = url;
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ============================================================
       탭 3. 체크리스트 (기존 site-checklist 앱 — 그대로 이식)

    // 구형 데이터(required/request/change 배열) → 신형(items 배열)으로 통합
    function normalizeDayLog(log) {
      if (!log) return { items: [] };
      if (Array.isArray(log.items)) return log;
      const merged = [
        ...(log.required || []),
        ...(log.request  || []),
        ...(log.change   || []),
      ].sort((a, b) => (a.id||0) - (b.id||0));
      return { items: merged };
    }

    const fmtDate = (d) => {
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), dd = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${dd}`;
    };
    const today = fmtDate(new Date());
    const tomorrow = fmtDate(new Date(Date.now() + 86400000));
    const dayLabel = (s) => {
      const days = ["일","월","화","수","목","금","토"];
      const d = new Date(s);
      return `${s.slice(5).replace("-","/")} (${days[d.getDay()]})`;
    };
    function lsLoad(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } }
    function lsSave(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
    const fmtMoney = (n) => (Number(n)||0).toLocaleString("ko-KR") + "원";
    const newId = (prefix) => prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);

    /* ============================================================
       현장(프로젝트) 컨텍스트 — 여러 현장을 하나의 앱에서 관리
       ============================================================ */
    const SiteContext = React.createContext({ siteId: null, site: null });

    /* ============================================================
       전역 토스트 알림
       ============================================================ */
    function ToastHost() {
      const [toast, setToast] = useState(null);
      useEffect(() => {
        _notify = (msg, type) => setToast({ msg, type: type || "error", key: Date.now() });
        return () => { _notify = () => {}; };
      }, []);
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 3000);
        return () => clearTimeout(t);
      }, [toast]);
      if (!toast) return null;
      return <div className={"toast " + (toast.type === "success" ? "toast-ok" : "toast-err")}>{toast.msg}</div>;
    }

    // 공정표 초기 공종 목록 (범용 건설·인테리어 공종)
    const PROCESS_LIST = [
      "가설공사", "철거·해체",
      "토공사·터파기", "기초공사",
      "조적공사", "콘크리트공사",
      "방수공사", "단열공사",
      "미장공사", "목공사",
      "창호공사", "유리공사",
      "금속공사", "타일공사",
      "석공사", "도장공사",
      "도배공사", "바닥공사",
      "천장공사", "칸막이·경량벽체",
      "설비·배관공사", "전기공사",
      "조명공사", "소방공사",
      "통신·약전공사", "냉난방·공조공사",
      "위생도기·수전공사", "가구공사",
      "조경공사", "입주청소",
      "준공검사", "기타",
    ];

    // 공정표 상태별 색상
    const STATUS_COLOR = { done: "#a0aec0", confirmed: "#4472C4", planned: "#ED8936" };
    const STATUS_LABEL = { done: "완료", confirmed: "확정", planned: "예정" };
    const DELAY_COLOR = "#E53E3E";
    // 완료되지 않았는데 종료일이 지난 작업인지 판단
    function isDelayed(task, todayStr) {
      return task.status !== "done" && task.endDate && task.endDate < todayStr;
    }

    function buildDateRange(start, end) {
      const arr = [];
      let d = new Date(start + "T00:00:00");
      const endD = new Date(end + "T00:00:00");
      while (d <= endD) { arr.push(fmtDate(d)); d.setDate(d.getDate()+1); }
      return arr;

    // ---- 날씨 (Open-Meteo, API 키 불필요) ----

    const SITE_LAT = 36.12;
    const SITE_LON = 128.34;
    const WEATHER_ICON = (code) => {
      if (code === 0) return "☀️";
      if (code === 1 || code === 2) return "🌤️";
      if (code === 3) return "☁️";
      if (code === 45 || code === 48) return "🌫️";
      if ([51,53,55,56,57].includes(code)) return "🌦️";
      if ([61,63,65,66,67,80,81,82].includes(code)) return "🌧️";
      if ([71,73,75,77,85,86].includes(code)) return "❄️";
      if ([95,96,99].includes(code)) return "⛈️";
      return "🌡️";
    };
    const WEATHER_LABEL = (code) => {
      if (code === 0) return "맑음";
      if (code === 1 || code === 2) return "대체로 맑음";
      if (code === 3) return "흐림";
      if (code === 45 || code === 48) return "안개";
      if ([51,53,55,56,57].includes(code)) return "이슬비";
      if ([61,63,65,66,67].includes(code)) return "비";
      if ([80,81,82].includes(code)) return "소나기";
      if ([71,73,75,77,85,86].includes(code)) return "눈";
      if ([95,96,99].includes(code)) return "뇌우";
      return "-";
    };
    async function fetchWeather(lat, lon) {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat||SITE_LAT}&longitude=${lon||SITE_LON}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=10`;
        const res = await fetch(url);
        const json = await res.json();
        const map = {};
        (json.daily?.time || []).forEach((date, i) => {
          map[date] = {
            code: json.daily.weathercode[i],
            tmax: Math.round(json.daily.temperature_2m_max[i]),
            tmin: Math.round(json.daily.temperature_2m_min[i]),
            pop: json.daily.precipitation_probability_max[i],
          };
        });
        return map;
      } catch (e) { console.warn("weather err", e); return {}; }
    }

    function ChecklistTab() {
      const { siteId } = React.useContext(SiteContext);
      const [sites, setSites]     = useState([]);

      const topRef = useRef();

      useEffect(() => {
        (async () => {
          const cloud = await cloudLoad();
          if (cloud) {
            setSites(cloud.sites || []);
            setLogs(cloud.logs || {});
            lsSave("sites", cloud.sites || []);
            lsSave("logs", cloud.logs || {});
          } else {
            setSites(lsLoad("sites") || []);
            setLogs(lsLoad("logs") || {});
          }
          setLoaded(true);
        })();
      }, []);

      const sync = (newSites, newLogs) => {
        lsSave("sites", newSites);
        lsSave("logs", newLogs);
        clearTimeout(syncTimer.current);
        setSyncing(true);
        syncTimer.current = setTimeout(async () => {
          await cloudSave(newSites, newLogs);
          setSyncing(false);
          setLastSync(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
        }, 800);
      };

      const logKey = curSite ? `${curSite}_${curDate}` : null;
      const dayLog = logKey ? normalizeDayLog(logs[logKey]) : null;

      const addItem = () => {
        const text = input.trim(); if (!text || !logKey) return;
        const item = { id: Date.now(), text, done: false, createdAt: new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}) };
        const nl = { ...logs, [logKey]: { ...dayLog, items: [...(dayLog.items||[]), item] } };
        setLogs(nl); sync(sites, nl);
        setInput("");
        inputRef.current?.focus();
      };
      const toggleItem = (key, cat, id) => {
        const nl = { ...logs, [key]: { ...(logs[key]||{}), [cat]: (logs[key]?.[cat]||[]).map(i => i.id===id?{...i,done:!i.done}:i) } };
        setLogs(nl); sync(sites, nl);
      };
      const deleteItem = (key, cat, id) => {
        const nl = { ...logs, [key]: { ...(logs[key]||{}), [cat]: (logs[key]?.[cat]||[]).filter(i => i.id!==id) } };
        setLogs(nl); sync(sites, nl);
      };
      const editItem = (key, cat, id, text) => {
        const nl = { ...logs, [key]: { ...(logs[key]||{}), [cat]: (logs[key]?.[cat]||[]).map(i => i.id===id?{...i,text}:i) } };
        setLogs(nl); sync(sites, nl);
      };

      const siteDates = curSite
        ? [...new Set(Object.keys(logs).filter(k=>k.startsWith(curSite+"_")).map(k=>k.replace(curSite+"_","")).filter(d => normalizeDayLog(logs[curSite+"_"+d]).items.length > 0))].sort((a,b)=>b.localeCompare(a))
        : [];

      if (!loaded) return <div style={{ padding:32, color:"#a0aec0", textAlign:"center" }}>불러오는 중...</div>;

      // 이전 날짜 목록 (현재 선택 날짜 제외, 항목 있는 날짜만)
      const pastDates = siteDates.filter(d => d !== curDate);

      return (
        <div style={{ maxWidth:680, margin:"0 auto", padding:"16px 12px" }} ref={topRef}>

          <div style={{ textAlign:"right", fontSize:11, color:"#a0aec0", marginBottom:8 }}>
            {syncing ? "⏳ 저장 중..." : lastSync ? `✅ ${lastSync} 동기화됨` : ""}
          </div>

          {!curSite ? (
            <div style={{ textAlign:"center", padding:"60px 0", color:"#a0aec0", fontSize:14 }}>현장을 추가해주세요</div>
          ) : (
            <>
              {/* 날짜 네비게이터 */}
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                <button onClick={()=>{ const d=new Date(curDate); d.setDate(d.getDate()-1); setCurDate(fmtDate(d)); }} style={navBtn}>‹</button>
                <input type="date" value={curDate} onChange={e=>setCurDate(e.target.value)} style={{ fontSize:14, fontWeight:500, background:"none", border:"none", outline:"none", cursor:"pointer", color:"#2d3748" }} />
                <span style={{ fontSize:13, color:"#a0aec0" }}>({["일","월","화","수","목","금","토"][new Date(curDate).getDay()]})</span>
                <button onClick={()=>{ const d=new Date(curDate); d.setDate(d.getDate()+1); setCurDate(fmtDate(d)); }} style={navBtn}>›</button>
                {curDate !== today && (
                  <button onClick={()=>setCurDate(today)} style={{ marginLeft:"auto", fontSize:12, color:"#FF6B35", background:"none", border:"1px solid #FF6B35", borderRadius:6, padding:"3px 10px", cursor:"pointer" }}>오늘</button>
                )}
              </div>

              {/* 현재 날짜 입력 + 목록 */}
              <div style={{ background:"#fff", borderRadius:12, border:"1.5px solid #e2e8f0", padding:"14px", marginBottom:16 }}>
                <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                  <input
                    ref={inputRef}
                    value={input}
                    onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addItem()}
                    placeholder="항목 추가... (Enter)"
                    style={{ flex:1, padding:"10px 14px", fontSize:14, borderRadius:10, border:"1.5px solid #FF6B35", outline:"none" }}
                  />
                  <button onClick={addItem} style={{ padding:"10px 18px", fontSize:14, borderRadius:10, background:"#FF6B35", color:"#fff", border:"none", cursor:"pointer", fontWeight:600 }}>추가</button>
                </div>
                {(dayLog?.items||[]).length === 0
                  ? <div style={{ fontSize:13, color:"#a0aec0", padding:"12px 0 4px", textAlign:"center" }}>항목을 추가해보세요</div>
                  : (dayLog?.items||[]).map(item => (
                      <ItemRow key={item.id} item={item}
                        onToggle={(id) => toggleItem(logKey, "items", id)}
                        onDelete={(id) => deleteItem(logKey, "items", id)}
                        onEdit={(id, text) => editItem(logKey, "items", id, text)} />
                    ))

                {(dayLog?.items||[]).length > 0 && (() => {
                  const total = dayLog.items.length;

                  return <div style={{ marginTop:8, fontSize:12, color:"#a0aec0", textAlign:"right" }}>{done}/{total} 완료{done===total&&total>0?" ✅":""}</div>;

              {pastDates.length > 0 && (
                <>
                  <div style={{ fontSize:12, fontWeight:500, color:"#a0aec0", marginBottom:8, paddingLeft:2 }}>이전 기록</div>
                  {pastDates.map(d => (
                    <HistoryDay key={d} d={d} logs={logs} logKey={`${curSite}_${d}`}
                      onGoDay={()=>{ setCurDate(d); topRef.current?.scrollIntoView({ behavior:"smooth" }); }}
                      onToggle={toggleItem} onDelete={deleteItem} onEdit={editItem} />
                  ))}
                </>
              )}
            </>
          )}
        </div>
      );

    function ScheduleTab() {
      const { siteId } = React.useContext(SiteContext);
      const [tasks, setTasks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [weather, setWeather] = useState({});
      const [adding, setAdding] = useState(false);
      const [addForm, setAddForm] = useState({ name:"", detail:"", startDate: today, endDate: today, status:"planned" });
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState(null);
      const [view, setView] = useState("calendar"); // "gantt" | "calendar"
      const [calMonth, setCalMonth] = useState(today.slice(0,7)); // "YYYY-MM"
      const [selectedDay, setSelectedDay] = useState(null);

      useEffect(() => {
        (async () => {
          const [data0, settings] = await Promise.all([fetchCollection("schedule", siteId), getSiteSettings(siteId)]);
          let data = data0;
          // 최초 1회만 시드 데이터 생성 (이미 시드한 현장은 다시 채우지 않음 — 삭제한 공정이 되살아나는 것 방지)
          if (data.length === 0 && !settings?.scheduleSeeded) {
            for (const t of SCHEDULE_SEED) { const { id: seedId, ...rest } = t; await setDoc("schedule", `${siteId}_${seedId}`, { ...rest, siteId }); }
            data = SCHEDULE_SEED.map(t => { const { id: seedId, ...rest } = t; return { ...rest, id: `${siteId}_${seedId}`, siteId }; });
            await saveSiteSettings(siteId, { scheduleSeeded: true });
          }
          setTasks(data);
          setLoaded(true);
          setWeather(await fetchWeather(settings?.lat, settings?.lon));
        })();
      }, [siteId]);

      const sorted = useMemo(() => [...tasks].sort((a,b) => a.startDate.localeCompare(b.startDate) || a.id.localeCompare(b.id)), [tasks]);

      // 작업 데이터 기반 동적 날짜 범위 (오늘 기준 -3일 ~ +14일을 기본으로 포함)
      const dateRange = useMemo(() => {
        let minD = today, maxD = today;
        const pad = (d, days) => { const dt = new Date(d + "T00:00:00"); dt.setDate(dt.getDate()+days); return fmtDate(dt); };
        tasks.forEach(t => {
          if (t.startDate && t.startDate < minD) minD = t.startDate;
          if (t.endDate && t.endDate > maxD) maxD = t.endDate;
        });
        return buildDateRange(pad(minD, -3), pad(maxD, 14));
      }, [tasks]);

      const doneCount = tasks.filter(t => t.status === "done").length;
      const progress = tasks.length ? Math.round((doneCount / tasks.length) * 100) : 0;
      const nextTask = sorted.find(t => t.status !== "done" && t.startDate >= today)
                    || sorted.find(t => t.status !== "done");

      const toggleDone = async (task) => {
        let patch;
        if (task.status === "done") {
          const prev = task.prevStatus || "confirmed";
          patch = { status: prev, color: STATUS_COLOR[prev] };
        } else {
          patch = { status: "done", color: STATUS_COLOR.done, prevStatus: task.status };
        }
        setTasks(ts => ts.map(t => t.id === task.id ? { ...t, ...patch } : t));
        await setDoc("schedule", task.id, patch);
      };

      const addTask = async () => {
        const name = (addForm.name === "__custom__" ? "" : addForm.name).trim();
        if (!name) return;
        const id = newId("task");
        const data = {
          name, detail: addForm.detail||"", startDate: addForm.startDate, endDate: (addForm.endDate && addForm.endDate >= addForm.startDate) ? addForm.endDate : addForm.startDate,
          status: addForm.status, color: STATUS_COLOR[addForm.status], siteId,
        };
        setTasks(ts => [...ts, { id, ...data }]);
        setAddForm({ name:"", detail:"", startDate: today, endDate: today, status:"planned" });
        setAdding(false);
        await setDoc("schedule", id, data);
      };

      const startEdit = (task) => {
        setEditingId(task.id);
        setEditForm({ name: task.name, detail: task.detail||"", startDate: task.startDate, endDate: task.endDate, status: task.status });
      };
      const cancelEdit = () => { setEditingId(null); setEditForm(null); };
      const saveEdit = async () => {
        const editedName = (editForm.name === "__custom__" ? "" : editForm.name).trim();
        const patch = {
          name: editedName || tasks.find(t=>t.id===editingId).name,
          detail: editForm.detail||"",
          startDate: editForm.startDate, endDate: (editForm.endDate && editForm.endDate >= editForm.startDate) ? editForm.endDate : editForm.startDate,
          status: editForm.status, color: STATUS_COLOR[editForm.status],
        };
        setTasks(ts => ts.map(t => t.id === editingId ? { ...t, ...patch } : t));
        await setDoc("schedule", editingId, patch);
        setEditingId(null); setEditForm(null);
      };
      const removeTask = async (id) => {
        if (!confirm("이 공정을 삭제할까요?")) return;
        setTasks(ts => ts.filter(t => t.id !== id));
        await deleteDocFn("schedule", id);
      };

      const addIsCustom = addForm.name === "__custom__" || (!PROCESS_LIST.includes(addForm.name) && addForm.name !== "");
      const addSelectVal = PROCESS_LIST.includes(addForm.name) ? addForm.name : (addIsCustom ? "__custom__" : "");

      if (!loaded) return <div style={{ padding:32, color:"#a0aec0", textAlign:"center" }}>불러오는 중...</div>;

      return (
        <div className="placeholder-wrap">
          <div style={{ display:"flex", gap:10, marginBottom:10 }}>
            <div style={{ flex:1, background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px" }}>
              <div style={{ fontSize:12, color:"#a0aec0" }}>전체 진행률</div>
              <div style={{ fontSize:22, fontWeight:900, color:"#1a1a2e" }}>{progress}%</div>
              <div style={{ marginTop:6, height:6, borderRadius:4, background:"#edf2f7", overflow:"hidden" }}>
                <div style={{ width:`${progress}%`, height:"100%", background:"#FF6B35", borderRadius:4 }} />
              </div>
              <div style={{ fontSize:11, color:"#a0aec0", marginTop:4 }}>{doneCount} / {tasks.length} 공종 완료</div>
            </div>
          </div>

          {nextTask && (
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"10px 14px", marginBottom:10, display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:11, fontWeight:700, color:"#fff", background:"#FF6B35", borderRadius:12, padding:"3px 9px" }}>다음 공정</span>
              <span style={{ fontSize:13, fontWeight:700, color:"#1a1a2e" }}>{nextTask.name}</span>
              <span style={{ fontSize:12, color:"#a0aec0", marginLeft:"auto" }}>{dayLabel(nextTask.startDate)}{nextTask.startDate!==nextTask.endDate ? ` ~ ${dayLabel(nextTask.endDate)}` : ""}</span>
            </div>
          )}

          {Object.keys(weather).length > 0 && (
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"10px 14px", marginBottom:10 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#1a1a2e", marginBottom:8 }}>현장 날씨</div>
              <div style={{ display:"flex", gap:8, overflowX:"auto" }}>
                {dateRange.filter(d => weather[d]).slice(0, 7).map(d => {
                  const w = weather[d];
                  const isToday = d === today;
                  return (
                    <div key={d} style={{
                      flex:"0 0 auto", minWidth:56, textAlign:"center", padding:"6px 4px", borderRadius:8,
                      background: isToday ? "#FFF3CD" : "#f7f8fa",
                    }}>
                      <div style={{ fontSize:10, color:"#a0aec0", fontWeight: isToday?900:500 }}>{isToday ? "오늘" : dayLabel(d).split(" ")[1]}</div>
                      <div style={{ fontSize:20, margin:"2px 0" }}>{WEATHER_ICON(w.code)}</div>
                      <div style={{ fontSize:11, color:"#4a5568" }}>{w.tmin}° / {w.tmax}°</div>
                      {w.pop > 0 && <div style={{ fontSize:10, color:"#4472C4" }}>💧{w.pop}%</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div style={{ display:"flex", gap:10, marginBottom:10, fontSize:11, color:"#718096", flexWrap:"wrap", alignItems:"center" }}>
            {Object.entries(STATUS_LABEL).map(([k,label]) => (
              <div key={k} style={{ display:"flex", alignItems:"center", gap:4 }}>
                <span style={{ width:12, height:12, borderRadius:3, background:STATUS_COLOR[k], display:"inline-block" }} />
                {label}
              </div>
            ))}
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ width:12, height:12, borderRadius:3, border:`2px solid ${DELAY_COLOR}`, display:"inline-block" }} />
              지연
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ width:12, height:12, borderRadius:3, background:"#FFE9A8", border:"1px solid #FFC107", display:"inline-block" }} />
              오늘
            </div>
            {view === "calendar" && (
              <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                <span style={{ width:14, height:14, borderRadius:"50%", background:"#4472C4", color:"#fff", fontSize:8, display:"inline-flex", alignItems:"center", justifyContent:"center" }}>☔</span>
                강수확률 {RAIN_ALERT_THRESHOLD}%↑
              </div>
            )}
            <div style={{ marginLeft:"auto", display:"flex", gap:4 }}>
              <button onClick={()=>setView("gantt")} style={{
                border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer",
                background: view==="gantt" ? "#FF6B35" : "#fff", color: view==="gantt" ? "#fff" : "#718096",
              }}>간트</button>
              <button onClick={()=>setView("calendar")} style={{
                border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer",
                background: view==="calendar" ? "#FF6B35" : "#fff", color: view==="calendar" ? "#fff" : "#718096",
              }}>달력</button>
            </div>
            <button onClick={()=>{ setAdding(a=>!a); setEditingId(null); }} style={{ background:"none", border:"none", color:"#FF6B35", fontSize:12, fontWeight:700, cursor:"pointer" }}>{adding ? "닫기" : "+ 공정 추가"}</button>
          </div>

          {adding && (
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px", marginBottom:10 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:8 }}>새 공정 추가</div>
              <select
                value={addSelectVal}
                onChange={e => {
                  if (e.target.value === "__custom__") setAddForm(f=>({...f, name:"__custom__"}));
                  else setAddForm(f=>({...f, name: e.target.value}));
                }}
                style={{...dl.input, marginBottom:6}}
              >
                <option value="">공정 선택...</option>
                {PROCESS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                <option value="__custom__">✏️ 직접 입력...</option>
              </select>
              {addIsCustom && (
                <input
                  value={addForm.name === "__custom__" ? "" : addForm.name}
                  onChange={e=>setAddForm(f=>({...f, name: e.target.value || "__custom__"}))}
                  placeholder="공정명 직접 입력"
                  style={{...dl.input, marginBottom:6}}
                  autoFocus
                />
              )}
              <input
                value={addForm.detail}
                onChange={e=>setAddForm(f=>({...f, detail: e.target.value}))}
                placeholder="세부 공정 내용 (예: 현관문 교체, 욕실 타일 시공)"
                style={{...dl.input, marginBottom:6, fontSize:13, color:"#555"}}
              />
              <div style={dl.row}>
                <input type="date" value={addForm.startDate} onChange={e=>setAddForm(f=>({...f,startDate:e.target.value,endDate:e.target.value>f.endDate?e.target.value:f.endDate}))} style={{...dl.input, flex:1}} />
                <span style={{ color:"#a0aec0" }}>~</span>
                <input type="date" value={addForm.endDate} onChange={e=>setAddForm(f=>({...f,endDate: e.target.value < f.startDate ? f.startDate : e.target.value}))} style={{...dl.input, flex:1}} />
              </div>
              <select value={addForm.status} onChange={e=>setAddForm(f=>({...f,status:e.target.value}))} style={{...dl.input, marginBottom:8}}>
                {Object.entries(STATUS_LABEL).map(([k,label]) => <option key={k} value={k}>{label}</option>)}
              </select>
              <button onClick={addTask} style={{ ...dl.primaryBtn, padding:"10px 0", fontSize:13 }}>추가</button>
            </div>
          )}

          {view === "gantt" && (
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
            <div style={{ overflowX:"auto" }}>
              <div style={{ minWidth: GANTT_NAME_W + dateRange.length * GANTT_COL_W }}>

                {/* 날짜 헤더 */}
                <div style={{ display:"flex", borderBottom:"1px solid #e2e8f0" }}>
                  <div style={{ width:GANTT_NAME_W, flexShrink:0, position:"sticky", left:0, background:"#fff", zIndex:2, borderRight:"1px solid #e2e8f0" }} />
                  {dateRange.map(d => {
                    const dt = new Date(d + "T00:00:00");
                    const dow = dt.getDay();
                    const isToday = d === today;
                    return (
                      <div key={d} style={{
                        width:GANTT_COL_W, flexShrink:0, textAlign:"center", padding:"6px 0",
                        background: isToday ? "#FFE9A8" : (dow===0 ? "#fff5f5" : dow===6 ? "#ebf8ff" : "transparent"),
                        borderLeft: isToday ? "2px solid #FFC107" : "none",
                        borderRight: isToday ? "2px solid #FFC107" : "none",
                      }}>
                        <div style={{ fontSize:11, fontWeight:isToday?900:500, color: isToday?"#b7791f":(dow===0?"#e53e3e":dow===6?"#2b6cb0":"#4a5568") }}>{d.slice(5).replace("-","/")}</div>
                        <div style={{ fontSize:9, color:"#a0aec0" }}>{["일","월","화","수","목","금","토"][dow]}</div>
                        {weather[d] && <div style={{ fontSize:11, lineHeight:1 }} title={WEATHER_LABEL(weather[d].code)}>{WEATHER_ICON(weather[d].code)}</div>}
                      </div>
                    );
                  })}
                </div>

                {/* 작업 행 */}
                {sorted.map(task => {
                  const startIdx = dateRange.indexOf(task.startDate);
                  const endIdx = dateRange.indexOf(task.endDate);
                  const s = startIdx < 0 ? 0 : startIdx;
                  const e = endIdx < 0 ? s : endIdx;
                  const delayed = isDelayed(task, today);
                  const isEditing = editingId === task.id && editForm;
                  const editIsCustom = isEditing && (editForm.name === "__custom__" || (!PROCESS_LIST.includes(editForm.name) && editForm.name !== ""));
                  const editSelectVal = isEditing ? (PROCESS_LIST.includes(editForm.name) ? editForm.name : "__custom__") : "";
                  return (
                    <div key={task.id} style={{ display:"flex", alignItems:"stretch", minHeight: isEditing ? 88 : 40, borderBottom:"1px solid #f0f0f3" }}>
                      {isEditing ? (
                          <div style={{
                            width:GANTT_NAME_W, flexShrink:0, position:"sticky", left:0, zIndex:3,
                            background:"#fffbf5", borderRight:"1px solid #FF6B35",
                            padding:"4px 4px", display:"flex", flexDirection:"column", gap:2,
                          }}>
                            <select
                              value={editSelectVal}
                              onChange={e => {
                                if (e.target.value === "__custom__") setEditForm(f=>({...f, name:"__custom__"}));
                                else setEditForm(f=>({...f, name: e.target.value}));
                              }}
                              style={{ width:"100%", fontSize:10, padding:"3px 3px", border:"1.5px solid #FF6B35", borderRadius:4, outline:"none" }}
                            >
                              {PROCESS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                              <option value="__custom__">✏️ 직접입력</option>
                            </select>
                            {editIsCustom && (
                              <input value={editForm.name === "__custom__" ? "" : editForm.name} onChange={e=>setEditForm(f=>({...f, name: e.target.value||"__custom__"}))} placeholder="공정명" style={{ width:"100%", fontSize:10, padding:"2px 3px", border:"1px solid #e2e8f0", borderRadius:3, outline:"none" }} autoFocus />
                            )}
                            <input value={editForm.detail||""} onChange={e=>setEditForm(f=>({...f, detail: e.target.value}))} placeholder="세부 공정 내용" style={{ width:"100%", fontSize:10, padding:"2px 3px", border:"1px solid #e2e8f0", borderRadius:3, outline:"none", color:"#555" }} />
                            <div style={{ display:"flex", gap:2 }}>
                              <input type="date" value={editForm.startDate} onChange={e=>setEditForm(f=>({...f,startDate:e.target.value,endDate:e.target.value>f.endDate?e.target.value:f.endDate}))} style={{ flex:1, fontSize:9, padding:"2px 2px", border:"1px solid #e2e8f0", borderRadius:3, outline:"none" }} />
                              <input type="date" value={editForm.endDate} onChange={e=>setEditForm(f=>({...f,endDate: e.target.value < f.startDate ? f.startDate : e.target.value}))} style={{ flex:1, fontSize:9, padding:"2px 2px", border:"1px solid #e2e8f0", borderRadius:3, outline:"none" }} />
                            </div>
                            <div style={{ display:"flex", gap:2 }}>
                              <select value={editForm.status} onChange={e=>setEditForm(f=>({...f,status:e.target.value}))} style={{ flex:1, fontSize:10, padding:"2px 2px", border:"1px solid #e2e8f0", borderRadius:3, outline:"none" }}>
                                {Object.entries(STATUS_LABEL).map(([k,label]) => <option key={k} value={k}>{label}</option>)}
                              </select>
                              <button onClick={saveEdit} style={{ background:"#FF6B35", color:"#fff", border:"none", borderRadius:3, padding:"2px 7px", fontSize:12, cursor:"pointer", fontWeight:700 }}>✓</button>
                              <button onClick={cancelEdit} style={{ background:"none", border:"1px solid #e2e8f0", borderRadius:3, padding:"2px 5px", fontSize:12, cursor:"pointer", color:"#718096" }}>✕</button>
                            </div>
                          </div>
                      ) : (
                        <div style={{
                          width:GANTT_NAME_W, flexShrink:0, position:"sticky", left:0, background:"#fff", zIndex:2,
                          borderRight:"1px solid #e2e8f0", padding:"0 4px 0 8px", fontSize:11.5, fontWeight:500,
                          color: task.status==="done" ? "#a0aec0" : "#2d3748",
                          display:"flex", alignItems:"center", gap:2,
                        }}>
                          {delayed && <span title="지연" style={{ fontSize:11, flexShrink:0 }}>⚠️</span>}
                          <span style={{ flex:1, minWidth:0, overflow:"hidden", display:"flex", flexDirection:"column", justifyContent:"center" }}>
                            <span style={{
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                              textDecoration: task.status==="done" ? "line-through" : "none",
                              color: delayed ? DELAY_COLOR : "inherit",
                            }} title={task.name}>{task.name}</span>
                            {task.detail && <span style={{ fontSize:9.5, color:"#a0aec0", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={task.detail}>{task.detail}</span>}
                          </span>
                          <button onClick={()=>{ startEdit(task); setAdding(false); }} title="수정" style={{ background:"none", border:"none", color:"#a0aec0", fontSize:11, cursor:"pointer", padding:"0 1px", flexShrink:0 }}>✏️</button>
                          <button onClick={()=>removeTask(task.id)} title="삭제" style={{ background:"none", border:"none", color:"#a0aec0", fontSize:13, cursor:"pointer", padding:"0 1px", flexShrink:0 }}>×</button>
                        </div>
                      )}
                      <div style={{ position:"relative", flex:`0 0 ${dateRange.length * GANTT_COL_W}px` }}>
                        {dateRange.map((d,i) => d===today && (
                          <div key={d} style={{ position:"absolute", left:i*GANTT_COL_W, top:0, bottom:0, width:GANTT_COL_W, background:"#FFF3CD", zIndex:0 }} />
                        ))}
                        <button
                          onClick={() => toggleDone(task)}
                          title={delayed ? "지연됨 · 터치하여 완료 처리" : "터치하여 완료 처리"}
                          style={{
                            position:"absolute", zIndex:1,
                            left: s*GANTT_COL_W + 2, top:6, bottom:6,
                            width: (e-s+1)*GANTT_COL_W - 4,
                            borderRadius:6, cursor:"pointer",
                            border: delayed ? `2px solid ${DELAY_COLOR}` : "none",
                            background: task.color || STATUS_COLOR[task.status] || STATUS_COLOR.planned,
                            color:"#fff", fontSize:11, fontWeight:700,
                            display:"flex", alignItems:"center", justifyContent:"center",
                            opacity: task.status==="done" ? 0.55 : 1,
                          }}
                        >{task.status==="done" ? "✓ 완료" : (delayed ? "⚠️ 지연" : "")}</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          )}
          {view === "gantt" && (
          <div style={{ fontSize:11, color:"#a0aec0", marginTop:8, textAlign:"center" }}>좌우로 스크롤하여 전체 공정을 확인하세요 · 공정 막대를 터치하면 완료 처리됩니다</div>
          )}

          {view === "calendar" && (
            <CalendarView
              tasks={tasks}
              weather={weather}
              calMonth={calMonth}
              setCalMonth={setCalMonth}
              selectedDay={selectedDay}
              setSelectedDay={setSelectedDay}
              today={today}
              toggleDone={toggleDone}
              startEdit={(t)=>{ startEdit(t); setAdding(false); }}
              removeTask={removeTask}
              editingId={editingId}
              editForm={editForm}
              setEditForm={setEditForm}
              saveEdit={saveEdit}
              cancelEdit={cancelEdit}
            />
          )}
        </div>
      );
    }

    /* ---- 공정표 달력 뷰 ---- */
    const RAIN_ALERT_THRESHOLD = 50; // 강수확률(%) 이 값 이상이면 "우천 주의" 배지 표시

    function CalendarView({ tasks, weather, calMonth, setCalMonth, selectedDay, setSelectedDay, today, toggleDone, startEdit, removeTask, editingId, editForm, setEditForm, saveEdit, cancelEdit }) {
      const [y, m] = calMonth.split("-").map(Number);

      const tasksByDate = useMemo(() => {
        const map = {};
        tasks.forEach(t => {
          buildDateRange(t.startDate, t.endDate || t.startDate).forEach(d => {
            (map[d] = map[d] || []).push(t);
          });
        });
        return map;
      }, [tasks]);

      const cells = useMemo(() => {
        const first = new Date(y, m - 1, 1);
        const startDow = first.getDay();
        const daysInMonth = new Date(y, m, 0).getDate();
        const arr = [];
        for (let i = 0; i < startDow; i++) arr.push(null);
        for (let d = 1; d <= daysInMonth; d++) arr.push(fmtDate(new Date(y, m - 1, d)));
        while (arr.length % 7 !== 0) arr.push(null);
        return arr;
      }, [y, m]);

      const shiftMonth = (delta) => {
        const dt = new Date(y, m - 1 + delta, 1);
        setCalMonth(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`);
        setSelectedDay(null);
      };

      const selTasks = selectedDay ? (tasksByDate[selectedDay] || []) : [];

      return (
        <div>
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"10px 12px", marginBottom:10 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <button onClick={()=>shiftMonth(-1)} style={{ background:"none", border:"none", fontSize:18, color:"#718096", cursor:"pointer", padding:"4px 10px" }}>‹</button>
              <div style={{ fontSize:14, fontWeight:700, color:"#1a1a2e" }}>{y}년 {m}월</div>
              <button onClick={()=>shiftMonth(1)} style={{ background:"none", border:"none", fontSize:18, color:"#718096", cursor:"pointer", padding:"4px 10px" }}>›</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
              {["일","월","화","수","목","금","토"].map((d,i) => (
                <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, color: i===0?"#e53e3e":i===6?"#2b6cb0":"#a0aec0", paddingBottom:4 }}>{d}</div>
              ))}
              {cells.map((d, i) => {
                if (!d) return <div key={i} />;
                const dow = new Date(d + "T00:00:00").getDay();
                const dayTasks = tasksByDate[d] || [];
                const isToday = d === today;
                const isSel = d === selectedDay;
                const hasDelay = dayTasks.some(t => isDelayed(t, today));
                const dayPop = weather && weather[d] ? weather[d].pop : null;
                const rainAlert = dayPop != null && dayPop >= RAIN_ALERT_THRESHOLD;
                return (
                  <div key={d} onClick={()=>setSelectedDay(isSel ? null : d)} title={rainAlert ? `우천 주의 (강수확률 ${dayPop}%)` : undefined} style={{
                    height:50, borderRadius:8, padding:"5px 2px 4px", cursor:"pointer", position:"relative",
                    border: isToday ? "2px solid #FFC107" : isSel ? "2px solid #FF6B35" : "1px solid #f0f0f3",
                    background: isSel ? "#FFF3E0" : (isToday ? "#FFF8E8" : "#fff"),
                    display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                  }}>
                    <div style={{ fontSize:12, fontWeight: isToday?900:500, lineHeight:1, color: dow===0?"#e53e3e":dow===6?"#2b6cb0":"#4a5568" }}>{Number(d.slice(8))}</div>
                    {dayTasks.length > 0 && (
                      <div style={{ display:"flex", gap:3, flexWrap:"wrap", justifyContent:"center" }}>
                        {dayTasks.slice(0,4).map((t,ti) => (
                          <div key={ti} style={{
                            width:8, height:8, borderRadius:"50%",
                            background: hasDelay && isDelayed(t,today) ? DELAY_COLOR : (t.color || STATUS_COLOR[t.status] || STATUS_COLOR.planned),
                            opacity: t.status==="done" ? 0.45 : 1,
                            flexShrink:0,
                          }} title={t.name} />
                        ))}
                        {dayTasks.length > 4 && <div style={{ fontSize:9, fontWeight:700, color:"#a0aec0", lineHeight:1 }}>+{dayTasks.length-4}</div>}
                      </div>
                    )}
                    {rainAlert && (
                      <div style={{
                        position:"absolute", top:-6, right:-4,
                        fontSize:9, lineHeight:1, background:"#4472C4", color:"#fff",
                        borderRadius:"50%", width:16, height:16, display:"flex", alignItems:"center", justifyContent:"center",
                        boxShadow:"0 1px 2px rgba(0,0,0,0.25)", zIndex:1,
                      }}>☔</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {selectedDay && (
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:"12px 14px" }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#1a1a2e", marginBottom:8 }}>{dayLabel(selectedDay)}</div>
              {selTasks.length === 0 ? (
                <div style={{ fontSize:12, color:"#a0aec0" }}>등록된 공정이 없습니다</div>
              ) : selTasks.map(t => {
                const calEditIsCustom = editingId === t.id && editForm && !PROCESS_LIST.includes(editForm.name);
                const calEditSelectVal = editingId === t.id && editForm && PROCESS_LIST.includes(editForm.name) ? editForm.name : "__custom__";
                return editingId === t.id && editForm ? (
                  <div key={t.id} style={{ padding:"10px 0", borderBottom:"1px solid #f0f0f3" }}>
                    <select
                      value={calEditSelectVal}
                      onChange={e => {
                        if (e.target.value === "__custom__") setEditForm(f=>({...f, name:"__custom__"}));
                        else setEditForm(f=>({...f, name: e.target.value}));
                      }}
                      style={{...dl.input, marginBottom:6, fontSize:13}}
                    >
                      {PROCESS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                      <option value="__custom__">✏️ 직접 입력...</option>
                    </select>
                    {calEditIsCustom && (
                      <input
                        value={editForm.name === "__custom__" ? "" : editForm.name}
                        onChange={e=>setEditForm(f=>({...f, name: e.target.value||"__custom__"}))}
                        placeholder="공정명 직접 입력"
                        style={{...dl.input, marginBottom:6, fontSize:13}}
                        autoFocus
                      />
                    )}
                    <input
                      value={editForm.detail||""}
                      onChange={e=>setEditForm(f=>({...f, detail: e.target.value}))}
                      placeholder="세부 공정 내용 (예: 현관문 교체, 욕실 타일 시공)"
                      style={{...dl.input, marginBottom:6, fontSize:13, color:"#555"}}
                    />
                    <div style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                      <input type="date" value={editForm.startDate} onChange={e=>setEditForm(f=>({...f,startDate:e.target.value,endDate:e.target.value>f.endDate?e.target.value:f.endDate}))} style={{...dl.input, flex:1, fontSize:12}} />
                      <span style={{ color:"#a0aec0", flexShrink:0 }}>~</span>
                      <input type="date" value={editForm.endDate} onChange={e=>setEditForm(f=>({...f,endDate: e.target.value < f.startDate ? f.startDate : e.target.value}))} style={{...dl.input, flex:1, fontSize:12}} />
                    </div>
                    <select value={editForm.status} onChange={e=>setEditForm(f=>({...f,status:e.target.value}))} style={{...dl.input, marginBottom:8, fontSize:13}}>
                      {Object.entries(STATUS_LABEL).map(([k,label]) => <option key={k} value={k}>{label}</option>)}
                    </select>
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={cancelEdit} style={{ flex:1, padding:"9px 0", border:"1.5px solid #e2e8f0", borderRadius:8, background:"none", color:"#718096", fontSize:13, cursor:"pointer" }}>취소</button>
                      <button onClick={saveEdit} style={{ flex:2, padding:"9px 0", border:"none", borderRadius:8, background:"#FF6B35", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>저장</button>
                    </div>
                  </div>
                ) : (
                  <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"1px solid #f0f0f3" }}>
                    <span style={{
                      fontSize:10, fontWeight:700, color:"#fff", borderRadius:4, padding:"2px 6px", flexShrink:0,
                      background: t.color || STATUS_COLOR[t.status] || STATUS_COLOR.planned,
                    }}>{STATUS_LABEL[t.status]}</span>
                    {isDelayed(t, today) && (
                      <span style={{ fontSize:10, fontWeight:700, color:"#fff", borderRadius:4, padding:"2px 6px", flexShrink:0, background:DELAY_COLOR }}>⚠️  지연</span>
                    )}
                    <span style={{ flex:1, display:"flex", flexDirection:"column" }}>
                      <span style={{
                        fontSize:13, color: t.status==="done" ? "#a0aec0" : "#2d3748",
                        textDecoration: t.status==="done" ? "line-through" : "none",
                      }}>{t.name}</span>
                      {t.detail && <span style={{ fontSize:11, color:"#a0aec0" }}>{t.detail}</span>}
                    </span>
                    <button onClick={()=>toggleDone(t)} title="완료 토글" style={{ background:"none", border:"none", color:"#a0aec0", fontSize:14, cursor:"pointer" }}>✓</button>
                    <button onClick={()=>startEdit(t)} title="수정" style={{ background:"none", border:"none", color:"#a0aec0", fontSize:13, cursor:"pointer" }}>✏️</button>
                    <button onClick={()=>removeTask(t.id)} title="삭제" style={{ background:"none", border:"none", color:"#a0aec0", fontSize:15, cursor:"pointer" }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ---- 탭 2. 작업일지 ---- */

    const dl = {
      card: { background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", padding:14, marginBottom:10 },
      label: { fontSize:12, fontWeight:700, color:"#4a5568", marginBottom:6, display:"block" },
      input: { width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8, border:"1.5px solid #e2e8f0", outline:"none", background:"#fff", color:"#2d3748" },
      row: { display:"flex", gap:6, marginBottom:6, alignItems:"center" },
      sectionTitle: { fontSize:14, fontWeight:700, color:"#1a1a2e", marginBottom:8, display:"flex", alignItems:"center", gap:6 },
      smallBtn: { background:"none", border:"1.5px dashed #cbd5e0", borderRadius:8, padding:"6px 12px", fontSize:12, color:"#a0aec0", cursor:"pointer" },
      removeBtn: { background:"none", border:"none", fontSize:18, cursor:"pointer", flexShrink:0, padding:"0 4px" },
      primaryBtn: { background:"#FF6B35", color:"#fff", border:"none", borderRadius:10, padding:"13px 0", fontSize:15, fontWeight:700, cursor:"pointer", width:"100%" },
      secondaryBtn: { background:"none", border:"1.5px solid #e2e8f0", borderRadius:10, padding:"13px 0", fontSize:14, fontWeight:500, cursor:"pointer", color:"#718096", width:"100%" },
    };

    const emptyForm = () => ({
      id: null,
      date: today,
      processes: [],
      processCustom: "",
      area: "",
      content: "",
      workers: [{ role: "", count: 1, laborCost: 0 }],
      materials: [{ name: "", unit: "", qty: 0, unitPrice: 0, totalPrice: 0 }],
      equipment: [{ name: "", cost: 0 }],
      otherCosts: [{ name: "", amount: 0 }],
      note: "",
      photos: [],
    });

    // otherCosts: 신규 형식은 [{name, amount}] 배열. 기존 {meal,delivery,etc} 형식 문서도 호환 처리.
    function normalizeOtherCosts(oc) {
      if (Array.isArray(oc)) return oc;
      if (oc && typeof oc === "object") {
        const out = [];
        if (Number(oc.meal)) out.push({ name: "식대", amount: Number(oc.meal) });
        if (Number(oc.delivery)) out.push({ name: "운반비", amount: Number(oc.delivery) });
        if (Number(oc.etc)) out.push({ name: "기타", amount: Number(oc.etc) });
        return out;
      }
      return [];
    }
    function otherCostsTotal(oc) {
      return normalizeOtherCosts(oc).reduce((s,o) => s + (Number(o.amount)||0), 0);
    }

    function calcMaterialCost(m) {
      return (Number(m.totalPrice)||0) > 0 ? Number(m.totalPrice) : (Number(m.qty)||0) * (Number(m.unitPrice)||0);
    }
    function calcTotal(f) {
      const workers = (f.workers||[]).reduce((s,w) => s + (Number(w.laborCost)||0), 0);
      const materials = (f.materials||[]).reduce((s,m) => s + calcMaterialCost(m), 0);
      const equipment = (f.equipment||[]).reduce((s,e) => s + (Number(e.cost)||0), 0);
      const other = otherCostsTotal(f.otherCosts);
      return workers + materials + equipment + other;
    }

    function DailyLogTab() {
      const { siteId } = React.useContext(SiteContext);
      const [logs, setLogs] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [view, setView] = useState("list"); // list | form
      const [form, setForm] = useState(emptyForm());
      const [filterProcess, setFilterProcess] = useState("");
      const [saving, setSaving] = useState(false);
      const [removedPhotos, setRemovedPhotos] = useState([]);
      const [gallery, setGallery] = useState(null); // { photos:[{url|previewUrl}], index } | null
      const [apiKey, setApiKey] = useState("");
      const [aiText, setAiText] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const contentRef = useRef(null);

      // 작업내용 textarea 자동 높이 조절 (내용이 길어져도 가려지지 않도록)
      useEffect(() => {
        if (contentRef.current) {
          contentRef.current.style.height = "auto";
          contentRef.current.style.height = contentRef.current.scrollHeight + "px";
        }
      }, [form.content, view]);

      useEffect(() => {
        (async () => {
          const [data, settings] = await Promise.all([fetchCollection("dailyLogs", siteId), getSiteSettings(siteId)]);
          setLogs(data);
          setApiKey(settings?.anthropicApiKey || "");
          setLoaded(true);
        })();
      }, [siteId]);

      const runAIParse = async () => {
        if (!aiText.trim()) return;
        if (!apiKey) { notify("설정 탭에서 Anthropic API 키를 먼저 등록해주세요."); return; }
        setAiLoading(true);
        try {
          const result = await parseDailyLogWithAI(aiText.trim(), apiKey);
          setForm(f => {
            const aiProcess = result.process ? result.process.trim() : "";
            const newProcesses = aiProcess && !f.processes.includes(aiProcess)
              ? [...f.processes, aiProcess]
              : f.processes;
            return {
              ...f,
              processes: newProcesses,
              area: result.area || f.area,
              content: result.content || f.content,
              workers: (result.workers && result.workers.length) ? result.workers.map(w => ({ role: w.role||"", count: Number(w.count)||1, laborCost: Number(w.laborCost)||0 })) : f.workers,
              materials: (result.materials && result.materials.length) ? result.materials.map(m => ({ name: m.name||"", unit: m.unit||"", qty: Number(m.qty)||0, unitPrice: Number(m.unitPrice)||0 })) : f.materials,
              equipment: (result.equipment && result.equipment.length) ? result.equipment.map(e => ({ name: e.name||"", cost: Number(e.cost)||0 })) : f.equipment,
              otherCosts: result.otherCosts && normalizeOtherCosts(result.otherCosts).length ? normalizeOtherCosts(result.otherCosts) : f.otherCosts,
              note: result.note || f.note,
            };
          });
          notify("AI가 내용을 분류해 채웠습니다. 확인 후 저장해주세요.", "success");
        } catch(e) {
          console.warn("AI parse err", e);
          notify("AI 분석에 실패했습니다: " + e.message);
        } finally {
          setAiLoading(false);
        }
      };

      const sorted = [...logs].sort((a,b) => b.date.localeCompare(a.date) || (b.id||"").localeCompare(a.id||""));
      // 구공정(문자열)과 신공정(배열) 모두 지원
      const getLogProcesses = (l) => Array.isArray(l.processes) && l.processes.length ? l.processes : (l.process ? [l.process] : []);
      const processOptions = [...new Set(logs.flatMap(l => getLogProcesses(l)).filter(Boolean))];
      const filtered = filterProcess ? sorted.filter(l => getLogProcesses(l).includes(filterProcess)) : sorted;
      const grandTotal = logs.reduce((s,l) => s + (Number(l.totalCost)||0), 0);

      const openNew = () => { setForm(emptyForm()); setRemovedPhotos([]); setView("form"); };

      const addPhotos = (files) => {
        const items = Array.from(files).map(file => ({ file, previewUrl: URL.createObjectURL(file) }));
        setForm(f => ({ ...f, photos: [...(f.photos||[]), ...items] }));
      };
      const removePhoto = (idx) => {
        setForm(f => {
          const target = f.photos[idx];
          if (target.url) setRemovedPhotos(rp => [...rp, target.url]);
          if (target.previewUrl) URL.revokeObjectURL(target.previewUrl);
          return { ...f, photos: f.photos.filter((_,i) => i!==idx) };
        });
      };
      const openEdit = (log) => {
        // 구형(process: 문자열) → 신형(processes: 배열) 호환 변환
        const processes = Array.isArray(log.processes) && log.processes.length
          ? log.processes
          : (log.process ? [log.process] : []);
        setForm({
          ...emptyForm(),
          ...log,
          processes,
          workers: log.workers?.length ? log.workers : emptyForm().workers,
          materials: log.materials?.length ? log.materials : emptyForm().materials,
          equipment: log.equipment?.length ? log.equipment : emptyForm().equipment,
          otherCosts: normalizeOtherCosts(log.otherCosts).length ? normalizeOtherCosts(log.otherCosts) : emptyForm().otherCosts,
          photos: (log.photos||[]).map(url => ({ url })),
        });
        setRemovedPhotos([]);
        setView("form");
      };

      const updateArr = (key, idx, field, value) => {
        setForm(f => ({ ...f, [key]: f[key].map((row,i) => i===idx ? { ...row, [field]: value } : row) }));
      };
      const addRow = (key, blank) => setForm(f => ({ ...f, [key]: [...f[key], blank] }));
      const removeRow = (key, idx) => setForm(f => ({ ...f, [key]: f[key].filter((_,i) => i!==idx) }));

      const save = async () => {
        const processes = form.processes.filter(Boolean);
        if (processes.length === 0) { alert("공정을 하나 이상 선택하거나 입력해주세요."); return; }
        const process = processes[0]; // 하위 호환용 첫 공정
        const id = form.id || newId("log");
        const totalCost = calcTotal(form);
        setSaving(true);

        // 새로 추가된 사진은 압축 후 업로드, 삭제된 사진은 Storage에서 제거
        const photoUrls = [];
        for (const p of (form.photos||[])) {
          if (p.url) photoUrls.push(p.url);
          else if (p.file) {
            try {
              const compressed = await compressImage(p.file);
              photoUrls.push(await uploadPhoto(compressed, `dailyLogs/${siteId}/${id}`));
            }
            catch(e) { console.warn("upload err", e); notify("사진 업로드에 실패했습니다."); }
          }
        }
        for (const url of removedPhotos) deletePhoto(url);

        const data = {
          siteId,
          date: form.date,
          processes,
          process,
          area: form.area,
          content: form.content,
          workers: form.workers.filter(w => w.role.trim() || (Number(w.laborCost)||0) > 0),
          materials: form.materials.filter(m => m.name.trim() || (Number(m.totalPrice)||0) > 0 || ((Number(m.qty)||0) * (Number(m.unitPrice)||0)) > 0),
          equipment: form.equipment.filter(e => e.name.trim() || (Number(e.cost)||0) > 0),
          otherCosts: form.otherCosts.filter(o => o.name.trim() || (Number(o.amount)||0) > 0),
          note: form.note,
          totalCost,
          photos: photoUrls,
        };
        await setDoc("dailyLogs", id, data);
        setSaving(false);
        setLogs(prev => {
          const exists = prev.some(l => l.id === id);
          return exists ? prev.map(l => l.id===id ? { id, ...data } : l) : [...prev, { id, ...data }];
        });
        setView("list");
      };

      const removeLog = async (id) => {
        if (!confirm("이 작업일지를 삭제할까요?")) return;
        await deleteDocFn("dailyLogs", id);
        setLogs(prev => prev.filter(l => l.id !== id));
      };

      if (!loaded) return <div style={{ padding:32, color:"#a0aec0", textAlign:"center" }}>불러오는 중...</div>;

      if (view === "form") {
        return (
          <>
          <div className="placeholder-wrap" style={{ paddingTop: 36 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <button onClick={()=>setView("list")} style={{ background:"none", border:"none", fontSize:22, color:"#1a1a2e", cursor:"pointer", padding:"0 4px 0 0", lineHeight:1 }}>←</button>
              <div style={{ ...dl.sectionTitle, marginBottom:0 }}>{form.id ? "작업일지 수정" : "새 작업일지"}</div>
            </div>

            <div style={dl.card}>
              <div style={dl.sectionTitle}>✨ AI 자동분류</div>
              <div style={{ fontSize:11, color:"#a0aec0", marginBottom:8 }}>오늘 작업 내용을 줄글로 쓰면 AI가 공정·작업구역·인원·자재·장비·비용을 분석해서 아래 항목에 자동으로 채워줍니다. 채워진 내용은 확인 후 필요하면 수정해서 저장하세요.</div>
              <textarea value={aiText} onChange={e=>setAiText(e.target.value)} placeholder="예: 오늘은 현장소장 외 2명이 화장실 조적 작업을 했고, 조적팀 3명 투입했어. 자재로 시멘트 10포대 80,000원 구매했고 식대 2만원 썼어." rows={4} style={{...dl.input, resize:"vertical", marginBottom:8}} />
              <button onClick={runAIParse} disabled={aiLoading || !aiText.trim()} style={{ ...dl.primaryBtn, padding:"11px 0", fontSize:14, opacity: (aiLoading || !aiText.trim()) ? 0.6 : 1 }}>{aiLoading ? "분석 중..." : "AI로 자동 분류"}</button>
              {!apiKey && <div style={{ fontSize:11, color:"#e53e3e", marginTop:6 }}>설정 탭에서 Anthropic API 키를 등록하면 사용할 수 있습니다.</div>}
            </div>

            <div style={dl.card}>
              <label style={dl.label}>날짜</label>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...dl.input, marginBottom:10}} />

              <label style={dl.label}>공정 <span style={{ fontWeight:400, color:"#a0aec0", fontSize:11 }}>(여러 공정 추가 가능)</span></label>
              {/* 선택된 공정 태그 */}
              {form.processes.length > 0 && (
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                  {form.processes.map((p, i) => (
                    <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:4, background:"#FF6B35", color:"#fff", borderRadius:20, padding:"4px 10px", fontSize:13, fontWeight:600 }}>
                      {p}
                      <button onClick={()=>setForm(f=>({...f, processes: f.processes.filter((_,j)=>j!==i)}))} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.85)", fontSize:15, cursor:"pointer", padding:0, lineHeight:1 }}>×</button>
                    </span>
                  ))}
                </div>
              )}
              {/* 공정 추가 드롭다운 */}
              <div style={{ fontSize:10, color:"#cbd5e0", marginBottom:3 }}>프리셋에서 선택</div>
              <select
                value=""
                onChange={e => {
                  const val = e.target.value;
                  if (!val) return;
                  if (val === "__custom__") { setForm(f=>({...f, processCustom: ""})); return; }
                  if (!form.processes.includes(val)) setForm(f=>({...f, processes: [...f.processes, val], processCustom: ""}));
                  e.target.value = "";
                }}
                style={{...dl.input, marginBottom: form.processCustom !== undefined && form.processCustom !== null ? 6 : 10, color:"#a0aec0"}}
              >
                <option value="">+ 공정 추가...</option>
                {PROCESS_LIST.filter(p => !form.processes.includes(p)).map(p => <option key={p} value={p}>{p}</option>)}
                <option value="__custom__">직접 입력...</option>
              </select>
              {/* 직접 입력 필드 */}
              <div style={{ fontSize:10, color:"#cbd5e0", marginBottom:3 }}>또는 직접 입력</div>
              <div style={{ display:"flex", gap:6, marginBottom:10 }}>
                <input
                  value={form.processCustom}
                  onChange={e=>setForm(f=>({...f, processCustom:e.target.value}))}
                  onKeyDown={e=>{
                    if(e.key==="Enter" && form.processCustom.trim()) {
                      const val = form.processCustom.trim();
                      if (!form.processes.includes(val)) setForm(f=>({...f, processes:[...f.processes,val], processCustom:""}));
                      else setForm(f=>({...f, processCustom:""}));
                    }
                  }}
                  placeholder="공정명 직접 입력 후 추가 버튼"
                  style={{...dl.input, flex:1}}
                />
                <button
                  onClick={()=>{
                    const val = form.processCustom.trim();
                    if (!val) return;
                    if (!form.processes.includes(val)) setForm(f=>({...f, processes:[...f.processes,val], processCustom:""}));
                    else setForm(f=>({...f, processCustom:""}));
                  }}
                  style={{ background:"#FF6B35", color:"#fff", border:"none", borderRadius:8, padding:"0 14px", fontSize:13, fontWeight:700, cursor:"pointer", flexShrink:0 }}
                >추가</button>
              </div>

              <label style={dl.label}>작업구역</label>
              <input value={form.area} onChange={e=>setForm(f=>({...f,area:e.target.value}))} placeholder="예: 욕실, 거실, 전체" style={{...dl.input, marginBottom:10}} />

              <label style={dl.label}>작업내용</label>
              <textarea ref={contentRef} value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="오늘 진행한 작업 내용" rows={3} style={{...dl.input, resize:"vertical", overflow:"hidden", minHeight:72}} />
            </div>

            <div style={dl.card}>
              <div style={dl.sectionTitle}>👷 투입인원</div>
              {form.workers.length > 0 && (
                <div style={{ display:"flex", gap:6, marginBottom:4, padding:"0 1px" }}>
                  <span style={{ flex:2, fontSize:11, fontWeight:700, color:"#a0aec0" }}>역할</span>
                  <span style={{ flex:1, fontSize:11, fontWeight:700, color:"#a0aec0" }}>인원</span>
                  <span style={{ flex:2, fontSize:11, fontWeight:700, color:"#a0aec0" }}>인건비(합계)</span>
                  <span style={{ width:22, flexShrink:0 }} />
                </div>
              )}
              {form.workers.map((w,i) => (
                <div key={i} style={dl.row}>

                  </div>
                  <div style={{ display:"flex", gap:4, alignItems:"center", flexWrap:"wrap" }}>
                    <input type="number" value={m.totalPrice||""} onChange={e=>updateArr("materials",i,"totalPrice",e.target.value)} onFocus={e=>e.target.select()} placeholder="총금액 직접 입력" style={{...dl.input, flex:"1 1 120px", background: useTotalPrice?"#fff3eb":"#fff", border: useTotalPrice?"1.5px solid #FF6B35":"1.5px solid #e2e8f0"}} />

                    <input value={m.unit} onChange={e=>updateArr("materials",i,"unit",e.target.value)} placeholder="단위" style={{...dl.input, flex:"0 0 52px", opacity: useTotalPrice?0.35:1}} />

                </div>

              <button style={dl.smallBtn} onClick={()=>addRow("materials",{name:"",unit:"",qty:0,unitPrice:0,totalPrice:0})}>+ 자재 추가</button>
            </div>

            <div style={dl.card}>
              <div style={dl.sectionTitle}>🛠 장비</div>
              {form.equipment.map((e2,i) => (
                <div key={i} style={dl.row}>
                  <input value={e2.name} onChange={e=>updateArr("equipment",i,"name",e.target.value)} placeholder="장비명(예: 리프트)" style={{...dl.input, flex:2}} />
                  <input type="number" value={e2.cost} onChange={e=>updateArr("equipment",i,"cost",e.target.value)} onFocus={e=>e.target.select()} placeholder="임대비" style={{...dl.input, flex:1}} />
                  <button onClick={()=>removeRow("equipment",i)} className="x-remove-btn" style={dl.removeBtn}>×</button>
                </div>
              ))}
              <button style={dl.smallBtn} onClick={()=>addRow("equipment",{name:"",cost:0})}>+ 장비 추가</button>
            </div>

            <div style={dl.card}>
              <div style={dl.sectionTitle}>💵 기타비용</div>
              {form.otherCosts.map((o,i) => (
                <div key={i} style={{ marginBottom:8 }}>
                  <div style={dl.row}>
                    <input value={o.name} onChange={e=>updateArr("otherCosts",i,"name",e.target.value)} placeholder="항목명(예: 식대, 주차비)" style={{...dl.input, flex:2}} />
                    <input type="number" value={o.amount} onChange={e=>updateArr("otherCosts",i,"amount",e.target.value)} onFocus={e=>e.target.select()} placeholder="금액" style={{...dl.input, flex:1}} />
                    <button onClick={()=>removeRow("otherCosts",i)} className="x-remove-btn" style={dl.removeBtn}>×</button>
                  </div>
                  <select value={o.process||""} onChange={e=>updateArr("otherCosts",i,"process",e.target.value)} style={{ width:"100%", fontSize:11, padding:"4px 8px", border:"1px solid #e2e8f0", borderRadius:6, outline:"none", color: o.process ? "#2d3748" : "#a0aec0", background:"#f7f8fa" }}>
                    <option value="">공정 지정 안 함 → 일지 공정 따름</option>
                    <option value="현장공통">🏗️ 현장공통 (식대·교통비·폐기물 등)</option>
                    {PROCESS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
              ))}
              <button style={dl.smallBtn} onClick={()=>addRow("otherCosts",{name:"",amount:0})}>+ 항목 추가</button>

            <div style={dl.card}>
              <div style={dl.sectionTitle}>📷 사진</div>
              {form.photos && form.photos.length > 0 && (
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>
                  {form.photos.map((p,i) => (
                    <div key={i} style={{ position:"relative", width:84, height:84, borderRadius:8, overflow:"hidden", border:"1px solid #e2e8f0" }}>
                      <img src={p.url || p.previewUrl} alt="" onClick={()=>setGallery({ photos: form.photos, index: i })} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block", cursor:"pointer" }} />
                      <button onClick={()=>removePhoto(i)} style={{ position:"absolute", top:2, right:2, width:20, height:20, borderRadius:"50%", border:"none", background:"rgba(26,26,46,0.65)", color:"#fff", fontSize:13, cursor:"pointer", lineHeight:1 }}>×</button>
                    </div>

                </div>

              </label>
            </div>

            <div style={dl.card}>
              <label style={dl.label}>특이사항</label>
              <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="현장 특이사항, 다음 작업 인계 내용 등" rows={2} style={{...dl.input, resize:"vertical"}} />

            <div style={{ ...dl.card, display:"flex", alignItems:"center", justifyContent:"space-between" }}>

            <div style={{ display:"flex", gap:8, marginTop:6 }}>
              <button style={dl.secondaryBtn} onClick={()=>setView("list")}>취소</button>

            </div>
          </div>
          {gallery && <PhotoLightbox gallery={gallery} setGallery={setGallery} />}
